  <script>
  // ═══════════ PROFİL MODAL JS ═══════════
  (function() {
    // ── Yardımcı ──────────────────────────────────────────
    function authHeaders() {
      const token = sessionStorage.getItem('access_token');
      return token ? { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' } : { 'Content-Type': 'application/json' };
    }

    async function apiFetch(url, options) {
      async function _doFetch(token) {
        const hdrs = { 'Content-Type': 'application/json' };
        if (token) hdrs['Authorization'] = 'Bearer ' + token;
        return fetch(url, { headers: hdrs, ...options });
      }

      let token = sessionStorage.getItem('access_token');
      let res = await _doFetch(token);

      // 401 alındıysa token Firebase JWT olabilir — backend JWT'ye çevir ve tekrar dene
      if (res.status === 401 && token) {
        try {
          const exRes = await fetch('/auth/firebase-token', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ firebase_token: token }),
          });
          if (exRes.ok) {
            const { access_token: newToken } = await exRes.json();
            sessionStorage.setItem('access_token', newToken);
            res = await _doFetch(newToken);
          }
        } catch (_) {}
      }

      if (!res.ok) throw new Error(await res.text());
      if (res.status === 204) return null;
      return res.json();
    }

    function getInitials(name) {
      if (!name || name === '—') return '?';
      return name.split(/[\s@]/)[0].slice(0, 2).toUpperCase();
    }
    function formatDate(iso) {
      if (!iso) return '—';
      const d = new Date(iso);
      return d.toLocaleDateString('tr-TR', { day:'2-digit', month:'short', year:'numeric' }) +
             ' ' + d.toLocaleTimeString('tr-TR', { hour:'2-digit', minute:'2-digit' });
    }

    // ── Modal elemanları ───────────────────────────────────
    const modal = document.getElementById('profileModal');
    const pmClose = document.getElementById('pmClose');
    const pmBackdrop = document.getElementById('pmBackdrop');
    const pmAvatar = document.getElementById('pmAvatar');
    const pmName = document.getElementById('pmName');
    const pmEmail = document.getElementById('pmEmail');
    const pmRoleBadge = document.getElementById('pmRoleBadge');
    const pmDisplayName = document.getElementById('pmDisplayName');
    const pmEmailInput = document.getElementById('pmEmailInput');
    const pmRoleInput = document.getElementById('pmRoleInput');
    const pmSaveBtn = document.getElementById('pmSaveBtn');
    const pmStatLastRun = document.getElementById('pmStatLastRun');
    const pmPipelineList = document.getElementById('pmPipelineList');
    const pmScenarioList = document.getElementById('pmScenarioList');

    let _pipelineCache = [];
    let _scenarioCache = [];

    // ── Tab geçişi ─────────────────────────────────────────
    document.querySelectorAll('.pm-tab').forEach(btn => {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.pm-tab').forEach(t => t.classList.remove('active'));
        this.classList.add('active');
      });
    });

    // ── Aç / kapat ─────────────────────────────────────────
    function openModal() {
      const username = sessionStorage.getItem('username') || '—';
      const role = sessionStorage.getItem('role') || 'user';
      const displayName = localStorage.getItem('koru_display_name') || username;

      pmAvatar.textContent = getInitials(displayName);
      pmName.textContent = displayName;
      pmEmail.textContent = username;
      pmDisplayName.value = displayName;
      pmEmailInput.value = username;
      pmRoleInput.value = role === 'admin' ? 'Yönetici (Admin)' : 'Kullanıcı';
      pmRoleBadge.textContent = role === 'admin' ? 'Admin' : 'Kullanıcı';
      pmRoleBadge.className = 'pm-role-badge ' + (role === 'admin' ? 'admin' : 'user');

      // Profil tab aktif
      document.querySelectorAll('.pm-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.pm-tab')[0].classList.add('active');
      document.getElementById('pmTabInfo').style.display = '';

      modal.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      modal.classList.remove('open');
      document.body.style.overflow = '';
    }

    pmClose.addEventListener('click', closeModal);
    pmBackdrop.addEventListener('click', closeModal);
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    // ── Görünen ad kaydet ──────────────────────────────────
    pmSaveBtn.addEventListener('click', function() {
      const newName = pmDisplayName.value.trim();
      if (!newName) return;
      localStorage.setItem('koru_display_name', newName);
      pmName.textContent = newName;
      pmAvatar.textContent = getInitials(newName);
      const userDisplay = document.getElementById('userDisplay');
      if (userDisplay) {
        userDisplay.innerHTML = `<span style="font-size:15px;">👤</span><span>${newName}</span><span style="font-size:9px;opacity:.7;">▼</span>`;
      }
      pmSaveBtn.textContent = '✓ Kaydedildi';
      pmSaveBtn.disabled = true;
      setTimeout(() => { pmSaveBtn.textContent = 'Değişiklikleri Kaydet'; pmSaveBtn.disabled = false; }, 1800);
    });

    // ── API: pipeline listesi yükle ────────────────────────
    async function loadAndRenderPipelines(statsOnly = false) {
      if (!pmPipelineList) return;
      try {
        const data = await apiFetch('/api/pipelines');
        _pipelineCache = data || [];
        if (pmStatLastRun && _pipelineCache.length > 0) {
          const last = _pipelineCache[0]; // desc sıralı geliyor
          pmStatLastRun.textContent = formatDate(last.created_at).split(' ').slice(0,2).join(' ');
        } else {
          pmStatLastRun.textContent = '—';
        }
        if (!statsOnly) renderPipelineList();
      } catch(e) {
        _pipelineCache = [];
        if (!statsOnly && pmPipelineList) {
          pmPipelineList.innerHTML = '<div class="pm-empty"><div class="pm-empty-icon">⚠️</div>Yüklenemedi. Oturum açık mı?</div>';
        }
      }
    }

    async function loadAndRenderScenarios(statsOnly = false) {
      if (!pmScenarioList) return;
      try {
        const data = await apiFetch('/api/scenario/mine');
        _scenarioCache = data || [];
        if (!statsOnly) renderScenarioList();
      } catch (e) {
        _scenarioCache = [];
        if (!statsOnly && pmScenarioList) {
          pmScenarioList.innerHTML = '<div class="pm-empty"><div class="pm-empty-icon">⚠️</div>Yüklenemedi. Oturum açık mı?</div>';
        }
      }
    }

    function renderScenarioList() {
      if (!_scenarioCache.length) {
        pmScenarioList.innerHTML = '<div class="pm-empty"><div class="pm-empty-icon">📭</div>Henüz kaydedilen senaryo yok.</div>';
        return;
      }
      pmScenarioList.innerHTML = '';
      _scenarioCache.forEach(item => {
        const sid = item.scenario_id;
        const summary = item.summary || {};
        const div = document.createElement('div');
        div.className = 'pm-pipeline-item';
        div.innerHTML =
          '<div class="pm-pipeline-icon">🧭</div>' +
          '<div class="pm-pipeline-info">' +
            `<div class="pm-pipeline-name">${item.name || ('Senaryo #' + sid)}</div>` +
            `<div class="pm-pipeline-meta">ID=${sid} • Nokta=${summary.total_points ?? '-'} • HIGH=${summary.high_count ?? '-'} • ${formatDate(item.created_at)}</div>` +
          '</div>' +
          '<div class="pm-pipeline-actions">' +
            `<button class="pm-pipeline-btn map" title="Haritada Göster">🗺 Göster</button>` +
            `<button class="pm-pipeline-btn pdf" title="PDF İndir">⬇ PDF</button>` +
            `<button class="pm-pipeline-btn show" title="JSON Göster">🗂 JSON</button>` +
            `<button class="pm-pipeline-btn del" data-sid="${sid}" title="Sil">✕</button>` +
          '</div>';

        div.querySelector('.map').addEventListener('click', async function() {
          try {
            closeModal();
            await window.loadSavedScenarioOnMap(sid);
          } catch (e) {
            alert('Senaryo haritada acilamadi: ' + e.message);
          }
        });
        div.querySelector('.pdf').addEventListener('click', function() {
          window.open(`/api/scenario/export/pdf/${sid}`, '_blank');
        });
        div.querySelector('.show').addEventListener('click', function() {
          window.open(`/api/scenario/export/json/${sid}`, '_blank');
        });
        div.querySelector('.del').addEventListener('click', async function() {
          const self = this;
          self.disabled = true;
          self.textContent = '⏳';
          try {
            await apiFetch(`/api/scenario/${sid}`, { method: 'DELETE' });
            _scenarioCache = _scenarioCache.filter(s => s.scenario_id !== sid);
            if (pmStatScenarios) pmStatScenarios.textContent = _scenarioCache.length;
            renderScenarioList();
          } catch (e) {
            self.disabled = false;
            self.textContent = '✕';
            alert('Silinemedi: ' + e.message);
          }
        });
        pmScenarioList.appendChild(div);
      });
    }

    function renderPipelineList() {
      if (!_pipelineCache.length) {
        pmPipelineList.innerHTML = '<div class="pm-empty"><div class="pm-empty-icon">📭</div>Henüz kaydedilen pipeline yok.<br>Pipeline çalıştırın, ardından kaydedin.</div>';
        return;
      }
      pmPipelineList.innerHTML = '';
      _pipelineCache.forEach(item => {
        const div = document.createElement('div');
        div.className = 'pm-pipeline-item';
        div.innerHTML =
          '<div class="pm-pipeline-icon">📄</div>' +
          '<div class="pm-pipeline-info">' +
            `<div class="pm-pipeline-name">${item.name}</div>` +
            `<div class="pm-pipeline-meta">n=${item.n} • k=${item.k} • ${formatDate(item.created_at)}</div>` +
          '</div>' +
          '<div class="pm-pipeline-actions">' +
            `<button class="pm-pipeline-btn show" title="Haritada Göster">🗺 Göster</button>` +
            `<button class="pm-pipeline-btn pdf" data-id="${item.id}" title="PDF İndir">⬇ PDF</button>` +
            `<button class="pm-pipeline-btn del" data-id="${item.id}" title="Sil">✕</button>` +
          '</div>';

        div.querySelector('.show').addEventListener('click', function() {
          closeModal();
          if (item.snapshot && typeof window.loadPipelineOnMap === 'function') {
            window.loadPipelineOnMap(item.snapshot);
          } else {
            const nInput = document.getElementById('pipelineN');
            const kInput = document.getElementById('pipelineK');
            if (nInput) nInput.value = item.n || 20;
            if (kInput) kInput.value = item.k || 4;
            const btn = document.getElementById('btnPipeline');
            if (btn) btn.click();
          }
        });

        div.querySelector('.pdf').addEventListener('click', async function() {
          const self = this;
          self.disabled = true;
          self.textContent = '⏳';

          async function fetchPdf(token) {
            return fetch(`/api/pipelines/${item.id}/pdf`, {
              headers: token ? { 'Authorization': 'Bearer ' + token } : {},
            });
          }

          try {
            let token = sessionStorage.getItem('access_token');
            let res = await fetchPdf(token);

            // Token Firebase JWT ise exchange yap ve tekrar dene
            if (res.status === 401 && token) {
              const exRes = await fetch('/auth/firebase-token', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ firebase_token: token }),
              });
              if (exRes.ok) {
                const { access_token: newToken } = await exRes.json();
                sessionStorage.setItem('access_token', newToken);
                res = await fetchPdf(newToken);
              }
            }

            if (!res.ok) { alert('PDF oluşturulamadı: ' + res.status); return; }
            const blob = await res.blob();
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `koru_pipeline_${item.id}.pdf`;
            a.click();
            URL.revokeObjectURL(url);
          } catch(e) {
            alert('PDF indirilemedi: ' + e.message);
          } finally {
            self.disabled = false;
            self.textContent = '⬇ PDF';
          }
        });

        div.querySelector('.del').addEventListener('click', async function() {
          const id = this.dataset.id;
          this.disabled = true;
          try {
            await apiFetch(`/api/pipelines/${id}`, { method: 'DELETE' });
            _pipelineCache = _pipelineCache.filter(p => String(p.id) !== String(id));
            renderPipelineList();
          } catch(e) {
            this.disabled = false;
          }
        });

        pmPipelineList.appendChild(div);
      });
    }

    // ── Global: modal aç ──────────────────────────────────
    window.openProfileModal = openModal;

    // Otomatik kayıt kaldırıldı: pipeline/senaryo yalnızca manuel butonlarla kaydedilir.
  })();
  </script>
</body>
</html>
