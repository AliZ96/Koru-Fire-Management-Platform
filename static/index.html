<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8"/>
  <title>KORU Yangın Önleme Platformu</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css"/>
  <link rel="icon" type="image/svg+xml" href="/static/img/login-bg.svg"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    :root{ --bg: #050E07; --accent: #F59E0B; --green: #4A7C3A; --green-hi: #6AAD58; --text: #E2F0DA; --text2: #7BA368; --danger: #EF4444; --border: rgba(74,124,58,.18); }
    html,body{height:100%;margin:0}
    body{ box-sizing:border-box; background: var(--bg); }
    .map-frame{ position:absolute; top:76px; left:12px; right:12px; bottom:68px; background:#fff; border:1px solid var(--border); border-radius:12px; box-shadow:0 6px 18px rgba(0,0,0,.25); overflow:hidden; transition:right 0.3s ease }
    #map{height:100%}
    .panel{position:fixed;top:76px;right:0;width:360px;height:calc(100% - 76px - 60px);z-index:9999;background:rgba(8,21,16,.95);padding:16px;border-radius:0;box-shadow:-2px 0 16px rgba(0,0,0,.25);font-family:'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;display:flex;flex-direction:column;gap:12px;overflow-y:auto;transform:translateX(100%);transition:transform 0.3s ease;backdrop-filter:blur(20px);border-left:1px solid var(--border);color:var(--text)}
    .panel.open{transform:translateX(0)}
    .panel-close-btn{position:absolute;top:2px;left:2px;width:24px;height:24px;background:none;border:none;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:all 0.2s ease;padding:0;margin:0;z-index:10001;font-weight:bold}
    .panel-close-btn:hover{color:var(--text);transform:scale(1.1)}
    .panel input{width:56px}
    .panel .section{margin:0;padding:12px 0;display:flex;flex-direction:column;gap:8px;border:none;border-bottom:1px dashed rgba(74,124,58,0.15);padding-right:0}
    .panel .section:last-child{border-bottom:none}
    .panel .section-title{display:block;font-weight:700;font-size:13px;color:var(--accent);margin-bottom:4px}
    .panel .row{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
    .panel label{font-size:11px;color:var(--text2);opacity:.85}
    .panel input[type=number]{height:28px;padding:3px 8px;border:1px solid rgba(74,124,58,.25);border-radius:8px;font-family:inherit;background:rgba(14,30,12,.8);color:var(--text)}
    .panel input[type=number]:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(245,158,11,.15)}
    .panel select{height:28px;padding:3px 8px;border:1px solid rgba(74,124,58,.25);border-radius:8px;font-family:inherit;font-size:12px;background:rgba(14,30,12,.8);color:var(--text);cursor:pointer}
    .panel select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(245,158,11,.15)}
    .panel input[type=text]{height:28px;padding:3px 8px;border:1px solid rgba(74,124,58,.25);border-radius:8px;font-family:inherit;background:rgba(14,30,12,.8);color:var(--text);width:100%;box-sizing:border-box}
    .panel input[type=text]:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(245,158,11,.15)}
    .scenario-form{display:flex;flex-direction:column;gap:10px;width:100%;padding-bottom:12px}
    .scenario-form .field{display:flex;flex-direction:column;gap:4px;width:100%}
    .scenario-form .two-cols{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%}
    .scenario-form input[type=number]{width:100%;box-sizing:border-box}
    .scenario-form select{width:100%;box-sizing:border-box}
    .scenario-help{font-size:10px;line-height:1.35;color:var(--text2);opacity:.9}
    .scenario-selected{font-size:11px;line-height:1.4;color:var(--text);background:rgba(14,30,12,.65);border:1px solid rgba(74,124,58,.18);border-radius:8px;padding:8px;width:100%;box-sizing:border-box}
    .scenario-error{font-size:11px;line-height:1.35;color:#fecaca;background:rgba(127,29,29,.35);border:1px solid rgba(239,68,68,.35);border-radius:8px;padding:8px;display:none}
    .scenario-success{font-size:11px;line-height:1.35;color:#bbf7d0;background:rgba(20,83,45,.35);border:1px solid rgba(34,197,94,.35);border-radius:8px;padding:8px;display:none}
    .panel-toggle{position:absolute;top:12px;right:12px;width:40px;height:40px;background:rgba(8,21,16,.85);color:var(--accent);border:1px solid rgba(74,124,58,.25);border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;transition:all 0.2s ease;padding:0;margin:0;z-index:9998;box-shadow:0 2px 8px rgba(0,0,0,.25)}
    .btn{cursor:pointer; border:1px solid rgba(74,124,58,.2); border-radius:10px; padding:6px 10px; background:rgba(14,30,12,.6); transition:all .15s ease; font-family:'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; font-size:12px; height:30px; color:var(--text) }
    .btn:hover{ box-shadow:0 3px 8px rgba(0,0,0,.2) }
    .btn:active{ transform:translateY(1px) }
    .btn:focus-visible{ outline:none; box-shadow:0 0 0 3px rgba(245,158,11,.25) }
    .btn-primary{ background: linear-gradient(135deg, #D97706, #F59E0B); color:#0A0A0A; border-color: transparent; font-weight:600 }
    .btn-primary:hover{ filter: brightness(1.08); box-shadow:0 5px 12px rgba(245,158,11,.3) }
    .btn-outline{ background:rgba(14,30,12,.6); color: var(--text2); border-color: rgba(74,124,58,.3); }
    .btn-outline:hover{ background: rgba(74,124,58,.15); border-color: var(--accent) }
    #info{ font-size:11px; color:var(--text2); margin-left:6px }
    .legend{background:rgba(8,21,16,.9);padding:6px 8px;border-radius:6px;box-shadow:0 2px 8px rgba(0,0,0,.25);font:12px/1.2 sans-serif;border:1px solid var(--border);color:var(--text)}
    .legend .row{display:flex;align-items:center;margin:2px 0}
    .legend .sw{width:14px;height:14px;margin-right:6px;border:1px solid rgba(74,124,58,.4)}
    .legend.pipeline-legend{background:rgba(255,255,255,.98);border:1px solid rgba(0,0,0,.12);color:#111827;box-shadow:0 8px 24px rgba(0,0,0,.18)}
    .legend.pipeline-legend .row{color:#111827;margin:4px 0}
    .legend.pipeline-legend .sw{border:1px solid rgba(17,24,39,.35)}
    .legend.pipeline-legend .legend-note{margin:6px 0;font-size:10px;line-height:1.45;color:#374151}
    .legend.pipeline-legend .legend-title{font-weight:700;color:#111827}
    .legend.pipeline-legend .legend-subtitle{font-weight:600;margin-top:6px;color:#111827}
    .header{position:absolute;top:0;left:0;right:0;z-index:10000;background:rgba(5,14,7,.92);padding:10px 16px;display:flex;align-items:center;gap:10px;justify-content:flex-start;border-bottom:1px solid var(--border); color:var(--text); flex-wrap:nowrap;backdrop-filter:blur(20px);height:64px}
    .nav-brand{display:flex;align-items:center;gap:8px;flex:0}
    .nav-icon{font-size:24px;display:flex;align-items:center}
    .header .title{color:var(--text); font-family:'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; font-weight:800; font-size:18px; letter-spacing:3px; white-space:nowrap; }
    .header .user-info{ color:var(--text); font-size:12px; font-weight:600; display:flex; align-items:center; gap:10px; white-space:nowrap; margin-left:auto; }
    .header .back-btn{ background:none; color:var(--text); border:none; padding:0; margin:0; cursor:pointer; font-size:18px; font-weight:600; font-family:'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; transition:all 0.2s ease; text-decoration:none; display:inline-block; white-space:nowrap; }
    .header .back-btn:hover{ opacity:0.7; }
    .user-dropdown{ position:relative; display:inline-block }
    .user-dropdown-toggle{ cursor:pointer; padding:7px 14px; border:1px solid rgba(245,158,11,.35); border-radius:10px; background:none; color:#F59E0B; font-size:13px; font-weight:600; font-family:'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; display:flex; align-items:center; gap:6px; transition:all .2s }
    .user-dropdown-toggle:hover{ background:rgba(245,158,11,.08); border-color:rgba(245,158,11,.6) }
    .user-dropdown-menu{ position:absolute; top:calc(100% + 8px); right:0; background:rgba(5,14,7,.97); border:1px solid rgba(74,124,58,.25); border-radius:12px; overflow:hidden; min-width:160px; box-shadow:0 12px 40px rgba(0,0,0,.5); opacity:0; pointer-events:none; transform:translateY(-4px); transition:all 0.2s ease; z-index:10001; backdrop-filter:blur(20px) }
    .user-dropdown-menu.show{ opacity:1; pointer-events:auto; transform:translateY(0) }
    .user-dropdown-menu a{ display:block; padding:11px 16px; color:#8DB87E; text-decoration:none; border-bottom:1px solid rgba(74,124,58,.12); font-size:13px; font-weight:600; font-family:'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; white-space:nowrap; cursor:pointer; transition:all .15s }
    .user-dropdown-menu a:last-child{ border-bottom:none }
    .user-dropdown-menu a:hover{ background:rgba(74,124,58,.12); color:#F59E0B }
    .logo{height:42px;width:auto; background: transparent; display:block}
    .brand-link{ text-decoration:none; color:inherit; display:flex; align-items:center; }
    .hamburger{width:32px;height:24px;display:inline-flex;flex-direction:column;justify-content:space-between;cursor:pointer;background:transparent;border:none;padding:0;margin:0}
    .hamburger span{display:block;height:3px;background:var(--text);border-radius:2px;opacity:0.9}
    .sidebar{position:fixed;top:0;right:0;bottom:0;width:300px;background:rgba(5,14,7,.97);color:var(--text);box-shadow:-2px 0 16px rgba(0,0,0,.25);transform:translateX(100%);transition:transform .25s ease;z-index:10050;display:flex;flex-direction:column}
    .sidebar.open{transform:translateX(0)}
    .sidebar a{padding:14px 18px;color:var(--text);text-decoration:none;border-bottom:1px solid var(--border);display:block}
    .sidebar, .sidebar a{ font-family:'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif }
    .sidebar a{ font-weight:600; letter-spacing:.2px }
    .sidebar a:hover{background:rgba(74,124,58,.12)}
    .backdrop{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:10040;opacity:0;pointer-events:none;transition:opacity .2s}
    .backdrop.show{opacity:1;pointer-events:auto}
    .status{ margin-left:auto; font:600 12px/1.2 sans-serif; color:var(--text2) }
    .footer{ position:absolute; left:0; right:0; bottom:0; height:60px; background:rgba(5,14,7,.92); display:flex; align-items:center; justify-content:space-between; padding:0 16px; border-top:1px solid var(--border) }
    .footer img{ height:52px; width:auto; display:block; max-width:50vw; object-fit:contain }
    .footer .contact{ font-family:'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; font-weight:600; font-size:12px; line-height:1; color: var(--text2); display:flex; align-items:center; gap:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; justify-content:flex-end }
    .footer .contact a{ color: var(--text2); text-decoration:none }
    .footer .contact a:hover{ text-decoration:underline }
    .footer .contact strong{ font-weight:800 }
    .copyable{ position:relative; display:inline-flex; align-items:center; gap:6px; color: var(--text2); padding:0 2px }
    .copy-btn{ display:none; font-family:'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; font-weight:700; font-size:11px; color:#0A0A0A; background: var(--accent); border:none; border-radius:10px; padding:2px 8px; cursor:pointer; line-height:1 }
    .copyable:hover .copy-btn{ display:inline-block }
    .proximity-popup{ z-index: 2000 !important; }
    .leaflet-popup-pane{ z-index: 2000 !important; }

    /* ═══ PROFİL MODAL ═══ */
    #profileModal{position:fixed;inset:0;z-index:20000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s ease}
    #profileModal.open{opacity:1;pointer-events:auto}
    #profileModal .pm-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(4px)}
    #profileModal .pm-sheet{position:relative;background:rgba(8,21,16,.97);border:1px solid rgba(74,124,58,.35);border-radius:16px;width:min(520px,94vw);max-height:86vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 24px 60px rgba(0,0,0,.6);transform:translateY(20px) scale(.97);transition:transform .25s ease;font-family:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif}
    #profileModal.open .pm-sheet{transform:translateY(0) scale(1)}
    .pm-header{padding:20px 24px 0;display:flex;align-items:flex-start;gap:16px;flex-shrink:0}
    .pm-avatar{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#2563eb,#10b981);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;color:#fff;flex-shrink:0;letter-spacing:-1px;box-shadow:0 4px 16px rgba(37,99,235,.4)}
    .pm-headinfo{flex:1;min-width:0}
    .pm-name{font-size:18px;font-weight:700;color:#d1fae5;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .pm-email{font-size:12px;color:#6b8f7a;margin-top:2px}
    .pm-role-badge{display:inline-block;margin-top:6px;padding:2px 10px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase}
    .pm-role-badge.admin{background:rgba(239,68,68,.18);color:#f87171;border:1px solid rgba(239,68,68,.3)}
    .pm-role-badge.user{background:rgba(37,99,235,.18);color:#93c5fd;border:1px solid rgba(37,99,235,.3)}
    .pm-close{background:none;border:none;color:#6b8f7a;cursor:pointer;font-size:20px;padding:0;line-height:1;transition:color .15s;flex-shrink:0}
    .pm-close:hover{color:#d1fae5}
    .pm-tabs{display:flex;gap:0;border-bottom:1px solid rgba(74,124,58,.2);margin:16px 24px 0;flex-shrink:0}
    .pm-tab{padding:8px 16px;font-size:12px;font-weight:600;color:#6b8f7a;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit}
    .pm-tab.active{color:#4ade80;border-bottom-color:#4ade80}
    .pm-tab:hover:not(.active){color:#d1fae5}
    .pm-body{flex:1;overflow-y:auto;padding:20px 24px 24px}
    .pm-body::-webkit-scrollbar{width:4px}
    .pm-body::-webkit-scrollbar-track{background:transparent}
    .pm-body::-webkit-scrollbar-thumb{background:rgba(74,124,58,.3);border-radius:2px}
    .pm-section{margin-bottom:20px}
    .pm-section-title{font-size:10px;font-weight:700;color:#6b8f7a;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid rgba(74,124,58,.12)}
    .pm-field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
    .pm-field label{font-size:11px;font-weight:600;color:#6b8f7a;letter-spacing:.4px}
    .pm-field input{background:rgba(255,255,255,.05);border:1px solid rgba(74,124,58,.25);border-radius:8px;padding:9px 12px;color:#d1fae5;font-size:13px;font-weight:500;font-family:inherit;outline:none;transition:border-color .15s}
    .pm-field input:focus{border-color:#4ade80}
    .pm-field input[readonly]{opacity:.55;cursor:default}
    .pm-stat-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
    .pm-stat{background:rgba(255,255,255,.04);border:1px solid rgba(74,124,58,.15);border-radius:10px;padding:12px 14px}
    .pm-stat-val{font-size:20px;font-weight:800;color:#4ade80}
    .pm-stat-lbl{font-size:10px;font-weight:600;color:#6b8f7a;margin-top:2px;letter-spacing:.4px}
    .pm-save-btn{width:100%;padding:10px;background:linear-gradient(135deg,#2563eb,#10b981);border:none;border-radius:10px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .15s;letter-spacing:.3px}
    .pm-save-btn:hover{opacity:.85}
    .pm-save-btn:disabled{opacity:.4;cursor:default}
    .pm-pipeline-list{display:flex;flex-direction:column;gap:8px}
    .pm-pipeline-item{background:rgba(255,255,255,.04);border:1px solid rgba(74,124,58,.18);border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:10px}
    .pm-pipeline-icon{font-size:22px;flex-shrink:0}
    .pm-pipeline-info{flex:1;min-width:0}
    .pm-pipeline-name{font-size:12px;font-weight:700;color:#d1fae5;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .pm-pipeline-meta{font-size:10px;color:#6b8f7a;margin-top:2px}
    .pm-pipeline-actions{display:flex;gap:6px;flex-shrink:0}
    .pm-pipeline-btn{background:none;border:1px solid rgba(74,124,58,.25);border-radius:6px;padding:4px 8px;font-size:11px;cursor:pointer;font-family:inherit;font-weight:600;transition:all .15s}
    .pm-pipeline-btn.dl{color:#4ade80;border-color:rgba(74,174,80,.3)}
    .pm-pipeline-btn.dl:hover{background:rgba(74,174,80,.12)}
    .pm-pipeline-btn.del{color:#f87171;border-color:rgba(248,113,113,.3)}
    .pm-pipeline-btn.del:hover{background:rgba(239,68,68,.12)}
    .pm-pipeline-btn.show{color:#f59e0b;border-color:rgba(245,158,11,.35)}
    .pm-pipeline-btn.show:hover{background:rgba(245,158,11,.12)}
    .pm-pipeline-btn.pdf{color:#22c55e;border-color:rgba(34,197,94,.35)}
    .pm-pipeline-btn.pdf:hover{background:rgba(34,197,94,.12)}
    .pm-empty{text-align:center;padding:32px 0;color:#6b8f7a;font-size:13px}
    .pm-empty-icon{font-size:40px;margin-bottom:10px}

    /* ═══ ACCORDION PANEL ═══ */
    .acc{border-bottom:1px solid rgba(74,124,58,.12)}
    .acc:last-of-type{border-bottom:none}
    .acc-head{display:flex;align-items:center;gap:8px;padding:12px 0;cursor:pointer;user-select:none;transition:color .2s}
    .acc-head:hover{color:var(--accent)}
    .acc-icon{flex-shrink:0;width:28px;height:28px;display:flex;align-items:center;justify-content:center;background:rgba(74,124,58,.1);border-radius:8px}
    .acc-icon svg{width:14px;height:14px;stroke:var(--text2);stroke-width:1.5;fill:none;stroke-linecap:round;stroke-linejoin:round}
    .acc-label{font-size:12px;font-weight:700;letter-spacing:.5px;flex:1;color:var(--text)}
    .acc-count{font-size:10px;font-weight:600;color:var(--text2);background:rgba(74,124,58,.12);border-radius:10px;padding:2px 8px}
    .acc-arrow{font-size:10px;color:var(--text2);transition:transform .25s ease;margin-left:4px}
    .acc.open .acc-arrow{transform:rotate(180deg)}
    .acc-body{max-height:0;overflow:hidden;transition:max-height .35s ease}
    .acc.open .acc-body{max-height:620px}
    .btn.btn-active{background:rgba(245,158,11,.18)!important;border-color:#f59e0b!important;color:#fde68a!important;box-shadow:0 0 0 2px rgba(245,158,11,.25)!important}
    .acc-body .row{display:flex;gap:6px;align-items:center;flex-wrap:wrap;padding:0 0 12px 0}
    .acc-body .row.row-ga{border-top:1px solid rgba(74,124,58,.2);padding-top:10px;margin-top:2px}
    .acc-ga-title{flex:1 0 100%;font-size:11px;font-weight:700;letter-spacing:.3px;color:var(--text2);margin:0 0 4px 0}
    @media (max-width:480px){ .panel{width:100%;top:76px;right:0;height:calc(100% - 76px - 60px);transform:translateX(100%)} .panel-toggle{right:12px} .panel-toggle.open{right:12px} .map-frame{top:88px; left:8px; right:8px; bottom:68px; border-width:1px} .header{padding:10px 12px} .logo{height:34px} .header .title{font-size:14px; letter-spacing:.05px; white-space:nowrap} .footer{height:64px} .footer img{height:44px; max-width:45vw} .footer .contact{font-size:11px} }
  </style>
</head>

  <div class="footer">

    function haversineKm(aLat,aLon,bLat,bLon){
      const R=6371; const toRad=x=>x*Math.PI/180;
      const dLat=toRad(bLat-aLat), dLon=toRad(bLon-aLon);
      const la1=toRad(aLat), la2=toRad(bLat);
      const h = Math.sin(dLat/2)**2 + Math.cos(la1)*Math.cos(la2)*Math.sin(dLon/2)**2;
      return 2*R*Math.asin(Math.sqrt(h));
    }

    let izmirBoundaryLayer = null;
    let izmirPolygons = null;

    function isPointInPolygon(lat, lon, polygon) {
      const ring = polygon;
      let inside = false;
      const n = ring.length;
      for (let i = 0; i < n; i++) {
        const [x1, y1] = ring[i];
        const [x2, y2] = ring[(i + 1) % n];
        if ((y1 > lat) !== (y2 > lat)) {
          const x_at_lat = (x2 - x1) * (lat - y1) / (y2 - y1) + x1;
          if (lon < x_at_lat) {
            inside = !inside;
          }
        }
      }
      return inside;
    }

    function isInIzmir(lat, lon) {
      if (!izmirPolygons || izmirPolygons.length === 0) return true;
      for (const polygonRings of izmirPolygons) {
        const outerRing = polygonRings[0];
        const holes = polygonRings.slice(1);
        if (isPointInPolygon(lat, lon, outerRing)) {
          let inHole = false;
          for (const hole of holes) {
            if (isPointInPolygon(lat, lon, hole)) {
              inHole = true;
              break;
            }
          }
          if (!inHole) return true;
        }
      }
      return false;
    }

    (async function loadIzmirBoundary(){
      try{
        const r = await fetch('/static/data/izmir.geojson');
        if(!r.ok) throw new Error('not_found');
        const gj = await r.json();

        izmirPolygons = [];
        function extractGeometry(geom) {
          if (!geom) return;
          if (geom.type === 'Polygon') {
            const rings = geom.coordinates.map(ring => ring.map(([lon, lat]) => [lon, lat]));
            izmirPolygons.push(rings);
          } else if (geom.type === 'MultiPolygon') {
            for (const poly of geom.coordinates) {
              const rings = poly.map(ring => ring.map(([lon, lat]) => [lon, lat]));
              izmirPolygons.push(rings);
            }
          }
        }

        if (gj.type === 'FeatureCollection') {
          for (const feat of (gj.features || [])) {
            extractGeometry(feat.geometry);
          }
        } else if (gj.type === 'Feature') {
          extractGeometry(gj.geometry);
        } else {
          extractGeometry(gj);
        }

        izmirBoundaryLayer = L.geoJSON(gj, {
          pane:'izmirBoundary',
          style: { color:'#F59E0B', weight:5, fillOpacity:0, opacity:1, dashArray:'' },
          // Sınır çizgisi sadece görsel; mouse/hover olaylarını pipeline gibi katmanlara bırakıyoruz.
          interactive: false,
          bubblingMouseEvents: false,
          pointToLayer: () => null
        }).addTo(map);
      }catch(e){ console.warn('İzmir sınır GeoJSON yüklenemedi:', e); }
    })();

    function createFiresLayer(geo){
      const filteredFeatures = (geo.features || []).filter(f => {
        const coords = f.geometry?.coordinates;
        if (!coords || coords.length < 2) return false;
        const [lon, lat] = coords;
        return isInIzmir(lat, lon);

      });

    function updateScenarioLocationView() {

    function setScenarioLocation(lat, lon, label) {
      const safeLat = Number(lat);
      const safeLon = Number(lon);

      if (!Number.isFinite(safeLat) || !Number.isFinite(safeLon)) {
        return;
      }

      scenarioSelectedLocation = {
        lat: safeLat,
        lon: safeLon,
        label: label || 'Harita seçimi'
      };

      updateScenarioLocationView();

      if (scenarioMarker) {
        try {
          map.removeLayer(scenarioMarker);
        } catch (e) {}
      }

      scenarioMarker = L.marker([safeLat, safeLon]).addTo(map);

      scenarioMarker.bindPopup(`
        <b>Senaryo Risk Lokasyonu</b><br>
        ${scenarioSelectedLocation.label}<br>

    function validateScenarioForm() {
      const name = (document.getElementById('scenarioName')?.value || '').trim();
      const ground = parseInt(document.getElementById('scenarioGroundVehicles')?.value || '0', 10);
      const air = parseInt(document.getElementById('scenarioAirVehicles')?.value || '0', 10);

      if (!name) {
        return {
          ok: false,
          message: 'Senaryo adı boş bırakılamaz.'
        };
      }

      if (!scenarioSelectedLocation) {
        return {
          ok: false,
          message: 'Risk lokasyonu seçmelisin.'
        };
      }

      if (!Number.isInteger(ground) || ground < 0) {
        return {
          ok: false,
          message: 'Kara aracı sayısı 0 veya daha büyük olmalı.'
        };
      }

      if (!Number.isInteger(air) || air < 0) {
        return {
          ok: false,
          message: 'Hava aracı sayısı 0 veya daha büyük olmalı.'
        };
      }

      if (ground + air < 1) {
        return {
          ok: false,
          message: 'En az 1 araç seçmelisin.'
        };
      }

      return {
        ok: true,
        name,
        ground,
        air
      };
    }

    function buildScenarioPayload(validated) {
      return {
        name: validated.name,
        risk_location: {
          lat: scenarioSelectedLocation.lat,
          lon: scenarioSelectedLocation.lon,
          label: scenarioSelectedLocation.label
        },
        vehicles: {
          ground: validated.ground,
          air: validated.air
        },
        created_from: 'S11.1 Scenario Builder Frontend'
      };
    }

    async function createScenarioFromForm() {
      setScenarioMessage('', '');

      const validation = validateScenarioForm();

      if (!validation.ok) {
        setScenarioMessage('error', validation.message);
        setStatus(validation.message);
        return;
      }

      const payload = buildScenarioPayload(validation);
      const info = document.getElementById('info');

      if (info) {
        info.textContent = 'Senaryo backende gönderiliyor...';
      }

      try {
        const accessToken = sessionStorage.getItem('access_token');
        const response = await fetch('/api/scenario/create', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            ...(accessToken ? { 'Authorization': 'Bearer ' + accessToken } : {})
          },
          body: JSON.stringify(payload)
        });

        const data = await response.json().catch(() => ({}));

        if (!response.ok) {
          const detail = typeof data.detail === 'string'
            ? data.detail
            : JSON.stringify(data.detail || data);

          throw new Error(detail || ('API hatası: ' + response.status));
        }

        const scenarioId = data.scenario_id != null ? data.scenario_id : '-';
        if (data.scenario_id != null) {
          lastCreatedScenarioId = data.scenario_id;
          enablePipelinePDF();
        }
        const totalPoints = data.summary?.total_points != null ? data.summary.total_points : '-';
        const highCount = data.summary?.high_count != null ? data.summary.high_count : '-';

        setScenarioMessage(
          'success',
          `Senaryo oluşturuldu. ID: ${scenarioId} | Nokta: ${totalPoints} | HIGH: ${highCount}`
        );

        setStatus(`Senaryo oluşturuldu (#${scenarioId})`);
      } catch (e) {
        const msg = `Senaryo oluşturma hatası: ${e.message}`;

        setScenarioMessage('error', msg);
        setStatus(msg);

        console.error('Scenario create error:', e);
      }
    }

    function randomBetween(min, max){
      return min + Math.random() * (max - min);
    }

    function createRandomFireList(highCount = 3, lowCount = 3){
      const bounds = {
        minLat: 38.10,
        maxLat: 38.65,
        minLon: 26.80,
        maxLon: 27.70
      };

      function makePoint(type, index){
        return {
          id: `${type}-${index + 1}`,
          type,
          lat: Number(randomBetween(bounds.minLat, bounds.maxLat).toFixed(5)),
          lon: Number(randomBetween(bounds.minLon, bounds.maxLon).toFixed(5))
        };
      }

      return {
        high: Array.from({ length: highCount }, (_, i) => makePoint('HIGH', i)),
        low: Array.from({ length: lowCount }, (_, i) => makePoint('LOW', i))
      };
    }

    async function loadSheltersXLSX(){
      const r = await fetch('/static/data/assembly_points.xlsx', {cache:'no-cache'});
      if(!r.ok) throw new Error('xlsx_not_found');
      const buf = await r.arrayBuffer();
      const wb = XLSX.read(buf, {type:'array'});
      const wsname = wb.SheetNames[0];
      const ws = wb.Sheets[wsname];
      const rows = XLSX.utils.sheet_to_json(ws, {defval:'', raw:false});
      const feats = [];
      for (const row of rows){
        const obj = {}; Object.keys(row).forEach(k=>obj[normalizeKey(k)] = row[k]);
        const name = obj.name || obj.ad || obj.isim || obj.title || '';
        let lat = obj.lat || obj.latitude || obj.enlem || obj.y;
        let lon = obj.lon || obj.lng || obj.long || obj.longitude || obj.boylam || obj.x;
        if ((lat===undefined || lon===undefined) && (obj.koordinat || obj.konum || obj.location || obj.point || obj.geom || obj.geometry)){
          const pr = parseCoordString(obj.koordinat || obj.konum || obj.location || obj.point || obj.geom || obj.geometry);
          lat = pr.lat; lon = pr.lon;
        }
        const toNum = (v)=>{
          if (typeof v === 'number') return v;
          if (!v) return NaN;
          let s = String(v).trim();
          if (s.includes(',') && !s.includes('.')) s = s.replace(',', '.');
          s = s.replace(/\s/g,'');
          const n = parseFloat(s); return isNaN(n)?NaN:n;
        };
        lat = toNum(lat); lon = toNum(lon);
        if (!isNaN(lat) && !isNaN(lon)){
          feats.push({ type:'Feature', geometry:{ type:'Point', coordinates:[lon,lat] }, properties:{ name, ...obj } });
        }
      }
      return { type:'FeatureCollection', features: feats };
    }
    function detectDelimiter(text){
      if (text.indexOf('\t')>=0) return '\t';
      const semi = (text.match(/;/g)||[]).length;
      const comma = (text.match(/,/g)||[]).length;
      return semi>comma ? ';' : ',';
    }
    function normalizeKey(k){
      if (!k) return '';
      let s = String(k).toLowerCase().trim();
      s = s.replace(/ı/g,'i').replace(/ş/g,'s').replace(/ğ/g,'g').replace(/ç/g,'c').replace(/ö/g,'o').replace(/ü/g,'u');
      s = s.replace(/\([^)]*\)/g,'');
      s = s.replace(/[^a-z0-9_]+/g,'_').replace(/_+/g,'_');
      return s;
    }
    function toNumber(val){
      if (typeof val === 'number') return val;
      if (!val) return NaN;
      let s = String(val).trim();
      if (s.includes(',') && !s.includes('.')) s = s.replace(',', '.');
      s = s.replace(/\s/g,'');
      const n = parseFloat(s);
      return isNaN(n) ? NaN : n;
    }
    function parseCoordString(val){
      if (!val) return {lat:NaN, lon:NaN};
      let s = String(val).trim();
      const m = s.match(/POINT\s*\(\s*([\-0-9\.,\s]+)\)/i);
      if (m) s = m[1];
      s = s.replace(/;/g,',').replace(/\s+/g,' ');
      const parts = s.split(',');
      if (parts.length>=2){
        const a = toNumber(parts[0]);
        const b = toNumber(parts[1]);
        if (a>=25 && a<=35 && b>=35 && b<=45) return {lat:b, lon:a};
        if (a>=35 && a<=45 && b>=25 && b<=35) return {lat:a, lon:b};
        return {lat:a, lon:b};
      }
      const sp = s.split(/\s+/);
      if (sp.length>=2){
        const a = toNumber(sp[0]); const b = toNumber(sp[1]);
        if (a>=25 && a<=35 && b>=35 && b<=45) return {lat:b, lon:a};
        if (a>=35 && a<=45 && b>=25 && b<=35) return {lat:a, lon:b};
        return {lat:a, lon:b};
      }
      return {lat:NaN, lon:NaN};
    }
    function csvToGeoJSON(text){
      const delim = detectDelimiter(text);
      const lines = text.split(/\r?\n/).filter(Boolean);
      if (lines.length < 2) throw new Error('empty_csv');
      const headers = lines[0].split(delim).map(h=>normalizeKey(h));
      const find = (...keys)=> headers.findIndex(h=>keys.includes(h));
      const idxLat = find('lat','latitude','y','enlem');
      const idxLon = find('lon','lng','long','longitude','x','boylam');
      const idxName = find('name','ad','isim','title');
      const idxCoord = find('koordinat','konum','location','point','geom','geometry');
      if ((idxLat<0 || idxLon<0) && idxCoord<0) throw new Error('latlon_missing');
      const feats = [];
      for (let i=1;i<lines.length;i++){
        const cols = lines[i].split(delim);
        let lat = NaN, lon = NaN;
        if (idxCoord>=0){ const pr = parseCoordString(cols[idxCoord]); lat = pr.lat; lon = pr.lon; }
        if (isNaN(lat)||isNaN(lon)){
          if (cols.length>Math.max(idxLat, idxLon)){
            lat = toNumber(cols[idxLat]);
            lon = toNumber(cols[idxLon]);
          }
        }
        if (isNaN(lat)||isNaN(lon)) continue;
        const props = {};
        headers.forEach((h,ix)=>{ props[h] = cols[ix]; });
        props.name = props.name || props.ad || props.isim || props.title || '';
        feats.push({ type:'Feature', geometry:{ type:'Point', coordinates:[lon,lat] }, properties: props });
      }
      return { type:'FeatureCollection', features: feats };
    }

      const r = await fetch('/static/data/assembly_points.csv', {cache:'no-cache'});

      return csvToGeoJSON(text);

          } else if (ext === 'xlsx' || ext === 'xls'){
            const r = await fetch(url, {cache:'no-cache'}); const buf = await r.arrayBuffer();
            const wb = XLSX.read(buf, {type:'array'}); const ws = wb.Sheets[wb.SheetNames[0]];
            const rows = XLSX.utils.sheet_to_json(ws, {defval:'', raw:false});
            const tmp = { type:'FeatureCollection', features: [] };
            for (const row of rows){
              const obj = {}; Object.keys(row).forEach(k=>obj[normalizeKey(k)] = row[k]);
              let lat = obj.lat || obj.latitude || obj.enlem || obj.y;
              let lon = obj.lon || obj.lng || obj.long || obj.longitude || obj.boylam || obj.x;
              if ((lat===undefined || lon===undefined) && (obj.koordinat || obj.konum || obj.location || obj.point || obj.geom || obj.geometry)){
                const pr = parseCoordString(obj.koordinat || obj.konum || obj.location || obj.point || obj.geom || obj.geometry);
                lat = pr.lat; lon = pr.lon;
              }
              const toNum = (v)=>{ if (typeof v==='number') return v; if(!v) return NaN; let s=String(v).trim(); if(s.includes(',')&&!s.includes('.')) s=s.replace(',', '.'); s=s.replace(/\s/g,''); const n=parseFloat(s); return isNaN(n)?NaN:n; };
              lat = toNum(lat); lon = toNum(lon);
              const name = obj.name || obj.ad || obj.isim || obj.title || '';
              if (!isNaN(lat)&&!isNaN(lon)) tmp.features.push({ type:'Feature', geometry:{ type:'Point', coordinates:[lon,lat] }, properties:{ name, ...obj } });
            }
            add(tmp);
          }
        }catch(e){ console.warn('shelter file parse failed:', url, e); }
      }
      return { type:'FeatureCollection', features: feats };
    }

    // Chaikin corner-cutting: köşeleri yumuşatır, daha gerçekçi rota görünümü
    function smoothCoords(coords, iterations = 3) {
      if (coords.length < 3) return coords;
      let pts = coords;
      for (let iter = 0; iter < iterations; iter++) {
        const res = [pts[0]];
        for (let i = 0; i < pts.length - 1; i++) {
          const p0 = pts[i], p1 = pts[i + 1];
          res.push([0.75 * p0[0] + 0.25 * p1[0], 0.75 * p0[1] + 0.25 * p1[1]]);
          res.push([0.25 * p0[0] + 0.75 * p1[0], 0.25 * p0[1] + 0.75 * p1[1]]);
        }
        res.push(pts[pts.length - 1]);
        pts = res;
      }
      return pts;
    }

      const pipeRes = await fetch('/api/optimize/pipeline', {

        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ n, k }),
      });
      if (!pipeRes.ok) throw new Error('Pipeline API hatasi: ' + pipeRes.status);

      if (!pipeData.success) throw new Error(pipeData.error || 'Pipeline basarisiz');

        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ pop_size: popSize, max_iterations: maxIterations, max_temperature: maxTemperature }),

      const runData = await runRes.json();
      if (!runData.success) throw new Error(runData.error || 'SA/GA basarisiz');

      lastOptimizationScenarioKey = key;
      return { n, k };

            map.getPane('routePane').style.zIndex = 780;
          }

          const vehicleColors = getVehicleColors(algo);
          const features = [];
          const iconPlacements = [];
          stations.forEach(station => {
            const vehicles = Array.isArray(station.vehicles) ? station.vehicles : [];
            if (!vehicles.length) return;

            const routeId = `${algo}-${station.station_id}`;
            routeIndex.push({
              route_id: routeId,
              algorithm: algo,
              station_id: station.station_id,
              distance: station.total_distance || 0,
            });

            vehicles.forEach((v, vIdx) => {
              const points = Array.isArray(v.polyline) ? v.polyline : [];
              const rawCoords = points
                .filter(p => Array.isArray(p) && p.length >= 2)
                .map(p => [Number(p[1]), Number(p[0])]);
              if (rawCoords.length < 2) return;
              // Script/JSON tour noktalarına birebir uyum için smoothing kapatıldı.
              const coords = rawCoords;

              const vColor = vehicleColors[vIdx] || vehicleColors[vehicleColors.length - 1];
              features.push({
                type: 'Feature',
                geometry: { type: 'LineString', coordinates: coords },
                properties: {
                  route_id: routeId,
                  algorithm: algo,
                  station_id: station.station_id,
                  station_name: station.station_name || `Station ${station.station_id}`,
                  distance: station.total_distance || 0,
                  vehicle_index: vIdx,
                  vehicle_label: `Araç ${vIdx + 1}`,
                  vehicle_count: vehicles.length,
                  fire_point_count: Array.isArray(station.assigned_fire_points) ? station.assigned_fire_points.length : 0,
                  cluster_target: k,
                  vehicle_color: vColor,
                }
              });

              // Araç ikonu için rotanın orta noktasını kaydet (coords = [lon,lat])
              const midCoord = coords[Math.floor(coords.length / 2)];
              iconPlacements.push({ latLng: [midCoord[1], midCoord[0]], color: vColor, vIdx, stationId: station.station_id });
            });
          });

          if (!features.length) throw new Error('Polyline cizilemedi');

          const layer = L.geoJSON({ type: 'FeatureCollection', features }, {
            pane: 'routePane',
            style: routeStyle,
            onEachFeature: (feature, routeLayer) => {
              const p = feature.properties || {};
              const vcColor = p.vehicle_color || '#6b7280';
              routeLayer.bindPopup(
                `<b>${p.algorithm} Rota – <span style="color:${vcColor}">${p.vehicle_label || 'Araç'}</span></b><br>` +
                `<strong>İstasyon:</strong> ${p.station_name} (${p.station_id})<br>` +
                `<strong>Araç:</strong> <span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${vcColor};margin-right:4px"></span>${p.vehicle_label}<br>` +
                `<strong>Atanan nokta:</strong> ${p.fire_point_count}<br>` +
                `<strong>Toplam mesafe:</strong> ${Number(p.distance || 0).toFixed(2)} km`
              );
            }
          }).addTo(map);

          layer._algorithm = algo;
          optimizationRouteLayers.push(layer);

          // Her araç rotasının ortasına 🚒 ikonu ekle
          iconPlacements.forEach(({ latLng, color, vIdx }) => {
            const icon = L.divIcon({
              className: '',
              html: `<div style="background:${color};color:#fff;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:14px;border:2px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.45);cursor:default" title="${algo} – Araç ${vIdx + 1}">🚒</div>`,
              iconSize: [26, 26],
              iconAnchor: [13, 13],
            });
            const marker = L.marker(latLng, { icon, pane: 'routePane', interactive: false });
            marker._algorithm = algo;
            marker.addTo(map);
            vehicleIconLayers.push(marker);
          });

          loadedAlgorithms.add(algo);
          rebuildRouteLegend();
          rebuildRouteSelect();
          refreshRouteStyles();
          setBtnActive(algo === 'SA' ? 'btnRouteSA' : 'btnRouteGA', true);

          info.textContent = `${algo} rotalari aktif (${features.length} rota)`;
          setStatus(`${algo} rotalari aktif (${features.length} rota)`);
        };

        // Kaydedilmis pipeline gösterimindeysek, SA/GA'yi yeniden hesaplama yerine snapshot'tan çiz.
        const savedOpt = savedPipelineSnapshot && savedPipelineSnapshot.optimization
          ? savedPipelineSnapshot.optimization[algo]
          : null;
        if (savedOpt) {
          info.textContent = `${algo} rotalari (kayitli snapshot) yukleniyor...`;
          setStatus(`${algo} rotalari (kayitli snapshot) yukleniyor...`);
          renderRoutes(savedOpt, Number(savedPipelineSnapshot.k || 0));
          return;
        }

        const { k } = await ensureOptimizationScenario();
        savedPipelineSnapshot = null;
        info.textContent = `${algo} rotalari yukleniyor...`;
        setStatus(`${algo} rotalari yukleniyor...`);
        const res = await fetch(`/api/optimize/${algo.toLowerCase()}`);
        if (!res.ok) throw new Error('API hatasi: ' + res.status);
        const data = await res.json();
        lastOptimizationResults[algo] = data;
        await persistCurrentScenarioOptimization(algo, data);
        renderRoutes(data, k);
      } catch (e) {
        info.textContent = `${algo} rota hatasi: ${e.message}`;
        console.error(`${algo} route error:`, e);
      }
    }

    function normalizeStoredOptimization(raw) {
      if (!raw) return null;

      if (Array.isArray(raw.stations)) return raw;

    window.loadSavedScenarioOnMap = async function(scenarioId) {
      const info = document.getElementById('info');
      if (scenarioId == null) return;
      const res = await fetch(`/api/scenario/get/${scenarioId}`);
      if (!res.ok) throw new Error('Senaryo API hatasi: ' + res.status);
      const scenario = await res.json();

      const snap = scenario.pipeline_snapshot || {};
      if (!Array.isArray(snap.pipeline_points) || snap.pipeline_points.length === 0) {
        throw new Error('Kayitli senaryo pipeline verisi icermiyor');
      }

      snap.optimization = {
        ...(snap.optimization || {}),
        ...(normalizeStoredOptimization(scenario.sa_result) ? { SA: normalizeStoredOptimization(scenario.sa_result) } : {}),
        ...(normalizeStoredOptimization(scenario.ga_result) ? { GA: normalizeStoredOptimization(scenario.ga_result) } : {}),
      };

      window.loadPipelineOnMap(snap);
      savedPipelineSnapshot = snap;
      lastCreatedScenarioId = scenario.scenario_id != null ? scenario.scenario_id : lastCreatedScenarioId;
      lastOptimizationResults.SA = normalizeStoredOptimization(scenario.sa_result);
      lastOptimizationResults.GA = normalizeStoredOptimization(scenario.ga_result);

      if (info) {
        info.textContent = `Kayitli senaryo yuklendi (#${scenario.scenario_id ?? scenarioId})`;
      }
      setStatus(`Kayitli senaryo aktif (#${scenario.scenario_id ?? scenarioId})`);
    };

    async function loadRiskForView(){
      const info = document.getElementById('info');
      const cellInput = document.getElementById('cellKm');
      const cellKm = Math.max(2, Math.min(50, parseInt((cellInput?.value)||'8',10)));
      info.textContent = 'Risk (contour) hesaplanıyor...'; setStatus('Risk hesaplanıyor...');
      try{
        const url = `/api/risk_grid?cell_km=${cellKm}&use_default_wind=true&${currentBboxParam()}`;
        const r = await fetch(url);
        const grid = await r.json();
        if (grid.error){ info.textContent = 'Risk hata: '+grid.error; return; }
        const {bbox, nrows, ncols, values} = grid;
        const minx=bbox[0], miny=bbox[1], maxx=bbox[2], maxy=bbox[3];
        const dx=(maxx-minx)/(ncols-1); const dy=(maxy-miny)/(nrows-1);
        const thresholds=[0.2,0.4,0.6,0.8];
        const contours = d3.contours().size([ncols, nrows]).thresholds(thresholds)(values);
        const feats=[];
        for (const con of contours){
          const val=con.value;
          const multiPoly = [];
          for (const poly of con.coordinates){
            const rings = [];
            for (const ring of poly){
              const coords = ring.map(([x,y])=>[minx + x*dx, miny + y*dy]);
              rings.push(coords);
            }
            multiPoly.push(rings);
          }
          feats.push({
            type:'Feature',
            geometry:{type:'MultiPolygon', coordinates: multiPoly},
            properties:{level:val}
          });
        }
        const geo = {type:'FeatureCollection', features:feats};
        if (riskLayer) map.removeLayer(riskLayer);
        riskLayer = L.geoJSON(geo, { style: f=>({
          color: contourColor(f.properties?.level||0),
          weight: 1,
          opacity: 0.8,
          fillColor: contourColor(f.properties?.level||0),
          fillOpacity: 0.28
        }) }).addTo(map);

        ensureLegend();
        if (legendCtl){ try{ legendCtl.remove(); }catch(e){} }
        legendCtl = L.control({position:'bottomright'});
        legendCtl.onAdd = function(){
          const div = L.DomUtil.create('div','legend');

        };
        legendCtl.addTo(map);
        info.textContent = 'Risk izohips çizgileri açık'; setStatus('Risk katmanı açık');

    async function drawSpread(){
      const info = document.getElementById('info');
      const c = map.getCenter();
      const durInput = document.getElementById('dur');
      if (!lastWind || lastWind.error){ await loadWindAtCenter(); }
      const dur = Math.max(5, Math.min(180, parseInt((durInput?.value)||'30',10)));
      const dir = lastWind?.deg ?? 240;
      const spd = lastWind?.speed_ms ?? 6;
      try{
        const url = `/api/spread?lat=${c.lat}&lon=${c.lng}&wind_dir_deg=${dir}&wind_speed_ms=${spd}&duration_min=${dur}`;

        const geo = await r.json();
        if (spreadLayer) map.removeLayer(spreadLayer);
        spreadLayer = L.geoJSON(geo, { style:{ color:'#d81b60', weight:2, fillColor:'#d81b60', fillOpacity:0.2 } }).addTo(map);
        try{ const b = spreadLayer.getBounds(); if (b.isValid()) map.fitBounds(b.pad(0.2)); }catch(e){}
        info.textContent = `Tahmin çizildi (dir: ${dir.toFixed?.(0)||dir}°, hız: ${spd.toFixed?.(1)||spd} m/s, ${dur} dk)`; setStatus('Yayılım tahmini çizildi');

    let _spreadOverlayLayer = null;
    let _spreadOriginMarker = null;
    let _pendingSpreadOriginMarker = null;
    let _spreadScenarioMarkersLayer = null;
    let _spreadHomeLink = null;
    let _spreadWindArrow = null;
    let _activeSpreadId = null;
    let _spreadWS = null;
    let _spreadPulseTimer = null;
    let _spreadAddMode = false;

    // Inject SVG hatch pattern into Leaflet overlay pane once it exists
    function _ensureHatchPattern() {
      const svgEl = document.querySelector('.leaflet-overlay-pane > svg');
      if (!svgEl || svgEl.querySelector('#koruFireHatch')) return;
      const ns = 'http://www.w3.org/2000/svg';
      let defs = svgEl.querySelector('defs');
      if (!defs) { defs = document.createElementNS(ns, 'defs'); svgEl.insertBefore(defs, svgEl.firstChild); }
      defs.innerHTML += `<pattern id="koruFireHatch" x="0" y="0" width="12" height="12" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
        <rect width="12" height="12" fill="rgba(255,80,0,0.18)"/>
        <line x1="0" y1="6" x2="12" y2="6" stroke="#FF4500" stroke-width="2.5" opacity="0.65"/>
      </pattern>`;
    }

    function _clearSpreadLayer() {
      if (_spreadOverlayLayer) { try { map.removeLayer(_spreadOverlayLayer); } catch(e){} _spreadOverlayLayer = null; }
      if (_spreadOriginMarker) { try { map.removeLayer(_spreadOriginMarker); } catch(e){} _spreadOriginMarker = null; }
      if (_pendingSpreadOriginMarker) { try { map.removeLayer(_pendingSpreadOriginMarker); } catch(e){} _pendingSpreadOriginMarker = null; }
      if (_spreadHomeLink) { try { map.removeLayer(_spreadHomeLink); } catch(e){} _spreadHomeLink = null; }
      if (_spreadWindArrow) { try { map.removeLayer(_spreadWindArrow); } catch(e){} _spreadWindArrow = null; }
      if (_spreadWS) { try { _spreadWS.close(); } catch(e){} _spreadWS = null; }
      if (_spreadPulseTimer) { clearInterval(_spreadPulseTimer); _spreadPulseTimer = null; }
      _spreadAutoFocusPending = false;
      _lastSpreadData = null;
      _activeSpreadId = null;
      document.getElementById('spreadInfo').innerHTML = '';
      document.getElementById('spreadEtaBox').innerHTML = '';
      _renderMyLocationMarker();
    }

    function _renderSpreadPolygon(feature) {
      if (_spreadOverlayLayer) { try { map.removeLayer(_spreadOverlayLayer); } catch(e){} }
      if (_spreadPulseTimer) { clearInterval(_spreadPulseTimer); }

      const coords = feature.geometry.coordinates[0].map(([lon, lat]) => [lat, lon]);
      if (!coords.length) return;

      _spreadOverlayLayer = L.polygon(coords, {
        color: '#CC3300',
        weight: 2,
        dashArray: '8, 4',
        opacity: 1,
        fillColor: '#FF4500',
        fillOpacity: 0.30,
        interactive: false,
      }).addTo(map);

      if (_spreadAutoFocusPending) {
        try {
          const b = _spreadOverlayLayer.getBounds();
          if (b.isValid()) map.fitBounds(b.pad(0.25));
        } catch(e) {}
        _spreadAutoFocusPending = false;
      }

      // Gentle fill pulse
      let op = 0.30, dir = -1;
      _spreadPulseTimer = setInterval(() => {
        op += dir * 0.03;
        if (op <= 0.12) dir = 1;
        if (op >= 0.35) dir = -1;
        if (_spreadOverlayLayer) try { _spreadOverlayLayer.setStyle({ fillOpacity: op }); } catch(e) {}
      }, 130);
    }

    function _renderOriginMarker(lat, lon) {
      if (!lat || !lon) return;
      if (_pendingSpreadOriginMarker) { try { map.removeLayer(_pendingSpreadOriginMarker); } catch(e){} _pendingSpreadOriginMarker = null; }
      if (_spreadOriginMarker) { try { map.removeLayer(_spreadOriginMarker); } catch(e){} }
      _spreadOriginMarker = L.circleMarker([lat, lon], {
        radius: 10,
        color: '#CC0000',
        weight: 3,
        fillColor: '#FF2200',
        fillOpacity: 1,
      }).bindPopup('<b>Yangin Baslangic Noktasi</b>').addTo(map);
    }

    function _renderPendingSpreadOrigin(lat, lon, label) {
      if (!lat || !lon) return;
      if (_pendingSpreadOriginMarker) { try { map.removeLayer(_pendingSpreadOriginMarker); } catch(e){} }
      _pendingSpreadOriginMarker = L.circleMarker([lat, lon], {
        radius: 9,
        color: '#FF8800',
        weight: 3,
        fillColor: '#FFD54F',
        fillOpacity: 0.95,
      }).bindPopup(`<b>${label || 'Yangin noktasi kaydediliyor...'}</b>`).addTo(map);
      try { _pendingSpreadOriginMarker.openPopup(); } catch(e) {}
    }

    function _renderSpreadScenarioMarkers(scenarios) {
      if (_spreadScenarioMarkersLayer) {
        try { map.removeLayer(_spreadScenarioMarkersLayer); } catch(e) {}
        _spreadScenarioMarkersLayer = null;
      }

      const layers = (scenarios || []).map((s) => {
        const lat = Number(s.origin_lat);
        const lon = Number(s.origin_lon);
        if (!Number.isFinite(lat) || !Number.isFinite(lon)) return null;

        const isTracked = _activeSpreadId === s.id;
        const isActive = s.status === 'active';
        const color = isTracked ? '#CC0000' : (isActive ? '#FF8800' : '#6B7280');
        const fillColor = isTracked ? '#FF2200' : (isActive ? '#FFD54F' : '#9CA3AF');
        const radius = isTracked ? 8 : 6;

        return L.circleMarker([lat, lon], {
          radius,
          color,
          weight: 2,
          fillColor,
          fillOpacity: 0.95,
        }).bindPopup(
          `<b>${s.name || 'Yangin Senaryosu'}</b><br>` +
          `${lat.toFixed(4)}, ${lon.toFixed(4)}<br>` +
          `Durum: ${isActive ? 'Aktif' : 'Durdu'}`
        );
      }).filter(Boolean);

      if (!layers.length) return;
      _spreadScenarioMarkersLayer = L.featureGroup(layers).addTo(map);
    }

    function _getHomeRiskState(etaMin, distKm) {
      if (etaMin === 0) {
        return {
          level: 'critical',
          label: 'Kritik Risk',
          markerColor: '#B71C1C',
          fillColor: '#E53935',
          lineColor: '#C62828',
        };
      }
      if (etaMin !== null && etaMin !== undefined && etaMin <= 90) {
        return {
          level: 'risk',
          label: 'Yüksek Risk',
          markerColor: '#C62828',
          fillColor: '#EF5350',
          lineColor: '#E53935',
        };
      }
      if (etaMin !== null && etaMin !== undefined && etaMin <= 240) {
        return {
          level: 'watch',
          label: 'Orta Risk',
          markerColor: '#F9A825',
          fillColor: '#FFD54F',
          lineColor: '#FBC02D',
        };
      }
      return {
        level: 'safe',
        label: 'Düşük Risk',
        markerColor: '#2E7D32',
        fillColor: '#66BB6A',
        lineColor: '#43A047',
      };
    }

    function _renderMyLocationMarker(riskState, meta) {
      if (!_mySpreadLocation) return;
      const state = riskState || {
        level: 'saved',
        label: 'Konum Kaydedildi',
        markerColor: '#1E88E5',
        fillColor: '#42A5F5',
      };
      const distanceText = meta?.distKm != null ? `${meta.distKm.toFixed(1)} km` : '—';
      const etaText = state.level === 'saved'
        ? 'ETA yangin takibinde hesaplanir'
        : (state.level === 'safe'
          ? 'Ulaşım beklenmiyor'
          : (meta?.etaMin === 0
            ? 'Yangın ev noktasına ulaştı'
            : (meta?.etaMin != null ? `Yaklaşık ${meta.etaMin.toFixed(0)} dk` : 'Ulaşım beklenmiyor')));

      if (window._myLocMarker) {
        try { map.removeLayer(window._myLocMarker); } catch(e) {}
      }

      window._myLocMarker = L.circleMarker([_mySpreadLocation.lat, _mySpreadLocation.lon], {
        radius: 9,
        color: state.markerColor,
        weight: 3,
        fillColor: state.fillColor,
        fillOpacity: 0.92,
      }).bindPopup(
        `<b>Ev Noktası</b><br>` +
        `<strong style="color:${state.markerColor}">${state.label}</strong><br>` +
        `Mesafe: ${distanceText}<br>` +
        `Tahmini Süre: ${etaText}`
      ).addTo(map);
    }

    function _renderHomeLink(origin, riskState, meta) {
      if (_spreadHomeLink) {
        try { map.removeLayer(_spreadHomeLink); } catch(e) {}
        _spreadHomeLink = null;
      }
      if (!_mySpreadLocation || !origin) return;

      const etaText = meta?.etaMin === 0
        ? 'Yangın ev noktasında'
        : (riskState.level === 'safe'
          ? 'Ulaşım beklenmiyor'
          : (meta?.etaMin != null ? `~${meta.etaMin.toFixed(0)} dk` : 'Ulaşım beklenmiyor'));
      const distText = meta?.distKm != null ? `${meta.distKm.toFixed(1)} km` : '—';
      const dashArray = riskState.level === 'safe' ? '10, 10' : (riskState.level === 'watch' ? '12, 8' : null);

      _spreadHomeLink = L.polyline([
        [origin.lat, origin.lon],
        [_mySpreadLocation.lat, _mySpreadLocation.lon],

        color: riskState.lineColor,

        opacity: 0.85,

      }).bindTooltip(
        `Ev hattı · ${riskState.label}<br>Mesafe: ${distText}<br>Tahmini Süre: ${etaText}`,
        { sticky: true }
      ).addTo(map);
    }

    function _renderWindArrow(lat, lon, windDir, windSpeedMs) {
      if (!lat || !lon) return;
      if (_spreadWindArrow) { try { map.removeLayer(_spreadWindArrow); } catch(e){} }
      // Arrow length scales with wind speed, roughly 0.01-0.05 degrees
      const len = Math.min(0.06, Math.max(0.01, windSpeedMs * 0.003));
      const rad = windDir * Math.PI / 180;
      const endLat = lat + len * Math.cos(rad);
      const endLon = lon + len * Math.sin(rad);
      _spreadWindArrow = L.polyline([[lat, lon], [endLat, endLon]], {
        color: '#FF8800',
        weight: 3,
        opacity: 0.85,
      }).bindTooltip(
        `Ruzgar yonu: ${windDir.toFixed(0)} derece  |  Hiz: ${(windSpeedMs * 3.6).toFixed(1)} km/s`,
        { sticky: true }
      ).addTo(map);
    }

    function _calcEtaFromSpreadData(data, userLat, userLon) {
      if (!data || !data.origin) return null;
      const R = 6371;
      const toR = x => x * Math.PI / 180;
      const dLat = toR(userLat - data.origin.lat), dLon = toR(userLon - data.origin.lon);
      const a = Math.sin(dLat/2)**2 + Math.cos(toR(data.origin.lat))*Math.cos(toR(userLat))*Math.sin(dLon/2)**2;
      const distKm = 2 * R * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
      const distM = distKm * 1000;

      const wDir = data.weather.wind_dir_deg;
      const wSpd = data.weather.wind_speed_ms;
      const hum = data.weather.humidity ?? 50;
      const temp = data.weather.temperature_c ?? 25;

      const dx = Math.sin(toR(userLon - data.origin.lon)) * Math.cos(toR(userLat));
      const dy = Math.cos(toR(data.origin.lat)) * Math.sin(toR(userLat))
               - Math.sin(toR(data.origin.lat)) * Math.cos(toR(userLat)) * Math.cos(toR(userLon - data.origin.lon));
      const bearing = (Math.atan2(dx, dy) * 180 / Math.PI + 360) % 360;
      const angleDiff = Math.abs(((bearing - wDir + 180) % 360) - 180);

      // Must match fire_spread_engine.py constants exactly
      const base = 0.15;
      const wf = 1.0 + wSpd * 0.22;
      const hf = Math.max(0.08, (100 - Math.min(hum, 100)) / 100);
      const tf = 1.0 + Math.max(0, temp - 20) * 0.015;
      const rateMs = base * wf * hf * tf;

      const cosF = Math.cos(angleDiff * Math.PI / 180);
      const dirR = cosF >= 0 ? rateMs * (cosF * 0.88 + 0.12) : rateMs * (Math.abs(cosF) * 0.04 + 0.08);
      const reach = dirR * (data.elapsed_minutes ?? 0) * 60;

      if (distM <= reach) return { eta: 0, distKm };
      if (dirR < 1e-6) return { eta: null, distKm };
      return { eta: (distM - reach) / dirR / 60, distKm };
    }

    function _showSpreadToast(msg, color) {
      const div = document.createElement('div');
      div.style.cssText = `position:fixed;top:82px;left:50%;transform:translateX(-50%);background:${color || '#c62828'};color:#fff;padding:11px 20px;border-radius:8px;z-index:99999;font-family:Inter,sans-serif;font-size:13px;font-weight:600;box-shadow:0 4px 18px rgba(0,0,0,.45);max-width:420px;text-align:center;pointer-events:none`;
      div.textContent = msg;
      document.body.appendChild(div);
      setTimeout(() => { try { document.body.removeChild(div); } catch(e){} }, 7000);
      if ('Notification' in window && Notification.permission === 'granted') {
        try { new Notification('KORU Yangın Uyarısı', { body: msg, icon: '/static/img/login-bg.svg' }); } catch(e){}
      }
    }

    async function _readApiError(r) {
      try {
        const data = await r.json();
        return data?.detail || data?.message || data?.error || `HTTP ${r.status}`;
      } catch (e) {
        try {
          const text = await r.text();
          return text || `HTTP ${r.status}`;
        } catch (_) {
          return `HTTP ${r.status}`;
        }
      }
    }

    function _renderSpreadState(data) {
      if (!data?.spread_polygon || !data?.origin || !data?.weather) return false;
      _lastSpreadData = data;
      _renderSpreadPolygon(data.spread_polygon);
      _renderOriginMarker(data.origin.lat, data.origin.lon);
      _renderWindArrow(data.origin.lat, data.origin.lon, data.weather.wind_dir_deg, data.weather.wind_speed_ms);
      _updateSpreadInfoPanel(data);
      if (_mySpreadLocation) {
        const res = _calcEtaFromSpreadData(data, _mySpreadLocation.lat, _mySpreadLocation.lon);
        if (res) {
          const homeRiskState = _getHomeRiskState(res.eta, res.distKm);
          _renderMyLocationMarker(homeRiskState, { etaMin: res.eta, distKm: res.distKm });
          _renderHomeLink(data.origin, homeRiskState, { etaMin: res.eta, distKm: res.distKm });
          _updateEtaBox(res.eta, res.distKm);
          if (res.eta !== null && res.eta < 30) {
            _showSpreadToast(
              res.eta === 0
                ? 'TEHLIKE: Yangın konumunuza ulaştı! Tahliye edin!'
                : `ACIL: Yangın ${res.eta.toFixed(0)} dk içinde konumunuza ulaşabilir!`,
              res.eta < 10 ? '#b71c1c' : '#e53935'
            );
          }
        } else {
          _renderMyLocationMarker();
          _updateEtaBox(null, null);
        }
      }
      return true;
    }

    async function loadSpreadSnapshot(scenarioId) {
      try {
        const r = await fetch(`/api/fire-spread/scenarios/${scenarioId}/current`);
        if (!r.ok) return false;
        const data = await r.json();
        return _renderSpreadState(data);
      } catch (e) {
        return false;
      }
    }

    async function loadSpreadScenarios() {
      const list = document.getElementById('spreadScenarioList');
      const cnt = document.getElementById('spreadScenarioCount');
      if (!list) return;
      try {
        const r = await fetch('/api/fire-spread/scenarios');
        if (!r.ok) throw new Error('API hatası');
        const scenarios = await r.json();
        _renderSpreadScenarioMarkers(scenarios);
        if (cnt) cnt.textContent = scenarios.filter(s => s.status === 'active').length;
        if (scenarios.length === 0) {
          if (_spreadScenarioMarkersLayer) {
            try { map.removeLayer(_spreadScenarioMarkersLayer); } catch(e) {}
            _spreadScenarioMarkersLayer = null;
          }
          list.innerHTML = '<div style="padding:4px 0;color:var(--text2)">Henüz senaryo yok. Haritaya tıklayın.</div>';
          return;
        }
        list.innerHTML = scenarios.map(s => {
          const elapsed = (s.elapsed_minutes || 0).toFixed(0);
          const active = s.status === 'active';
          return `<div style="display:flex;align-items:center;gap:5px;padding:5px 0;border-bottom:1px solid var(--border)">
            <div style="flex:1;min-width:0">
              <div style="font-size:11px;font-weight:700;color:${active ? '#FF5500' : 'var(--text2)'};overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.name}</div>
              <div style="font-size:10px;color:var(--text2)">${elapsed} dk · ${s.origin_lat?.toFixed(3)},${s.origin_lon?.toFixed(3)}</div>
            </div>
            <button class="btn btn-outline" onclick="trackSpreadScenario(${s.id})" style="font-size:10px;padding:2px 7px;height:24px">${_activeSpreadId === s.id ? 'Takip Ediliyor' : 'Takip'}</button>
            ${active ? `<button class="btn" onclick="stopSpreadScenario(${s.id})" style="font-size:10px;padding:2px 7px;height:24px;color:var(--danger);border-color:var(--danger)">Dur</button>` : ''}
          </div>`;
        }).join('');
      } catch (e) {
        list.innerHTML = `<div style="color:var(--danger);font-size:11px">Yüklenemedi: ${e.message}</div>`;
      }
    }

    async function createSpreadScenario(lat, lon) {
      const name = `Yangın ${new Date().toLocaleTimeString('tr-TR', {hour:'2-digit',minute:'2-digit'})}`;
      _renderPendingSpreadOrigin(lat, lon, 'Yangin noktasi kaydediliyor...');
      setStatus('Senaryo oluşturuluyor...');
      try {
        const r = await fetch('/api/fire-spread/scenarios', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ name, lat, lon }),
        });
        if (!r.ok) throw new Error(await _readApiError(r));
        const data = await r.json();
        setStatus(`Senaryo oluşturuldu: ${name}`);
        await loadSpreadScenarios();
        await trackSpreadScenario(data.id, {lat, lon, name}, {autoFocus: false});
      } catch(e) {
        if (_pendingSpreadOriginMarker) { try { map.removeLayer(_pendingSpreadOriginMarker); } catch(err){} _pendingSpreadOriginMarker = null; }
        setStatus('Senaryo oluşturulamadı: ' + e.message);
      }
    }

    async function stopSpreadScenario(id) {
      await fetch(`/api/fire-spread/scenarios/${id}/stop`, {method:'PATCH'});
      if (_activeSpreadId === id) _clearSpreadLayer();
      await loadSpreadScenarios();
      setStatus('Senaryo durduruldu');
    }

    async function clearAllSpreadScenarios() {
      try {
        const res = await fetch('/api/fire-spread/scenarios', { method: 'DELETE' });
        if (!res.ok) throw new Error('API hatası: ' + res.status);
        _clearSpreadLayer();
        _activeSpreadId = null;
        if (_spreadWS) { try { _spreadWS.close(); } catch(e) {} _spreadWS = null; }
        await loadSpreadScenarios();
        setStatus('Tüm senaryolar sıfırlandı');
      } catch(e) {
        setStatus('Sıfırlama başarısız: ' + e.message);
        console.error('clearAllSpreadScenarios error:', e);
      }
    }

    async function trackSpreadScenario(scenarioId, fallbackState, options) {
      if (_activeSpreadId === scenarioId) { _clearSpreadLayer(); await loadSpreadScenarios(); return; }
      _clearSpreadLayer();
      _activeSpreadId = scenarioId;
      _spreadAutoFocusPending = options?.autoFocus !== false;
      if (fallbackState?.lat != null && fallbackState?.lon != null) {
        _renderPendingSpreadOrigin(fallbackState.lat, fallbackState.lon, 'Yangin noktasi eklendi, yayilim yukleniyor...');
      }
      await loadSpreadScenarios();
      const hasInitialState = await loadSpreadSnapshot(scenarioId);

      const wsProto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      const wsUrl = `${wsProto}//${location.host}/api/fire-spread/ws/${scenarioId}`;
      setStatus(hasInitialState ? 'Yangın yayılımı hazır, canlı bağlantı kuruluyor...' : 'Yangın yayılımı bağlanıyor...');

      function connectWS() {
        const ws = new WebSocket(wsUrl);
        _spreadWS = ws;

        ws.onopen = () => { setStatus('Yangın yayılımı canlı izleniyor'); };

        ws.onmessage = (e) => {
          const data = JSON.parse(e.data);
          if (data.event === 'spread_update') {
            _renderSpreadState(data);
          } else if (data.event === 'heartbeat') {
            ws.send('ping');
          }
        };

        ws.onclose = () => {
          if (_activeSpreadId === scenarioId) {
            setStatus('Bağlantı kesildi, yeniden bağlanılıyor...');
            setTimeout(() => { if (_activeSpreadId === scenarioId) connectWS(); }, 8000);
          }
        };
      }

      connectWS();
    }

    // Harita üzerinde "tıklayın" overlay talimatı
    let _spreadHintEl = null;
    function _showSpreadHint() {
      if (_spreadHintEl) return;
      _spreadHintEl = document.createElement('div');
      _spreadHintEl.style.cssText = 'position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(200,40,0,.88);color:#fff;padding:12px 22px;border-radius:10px;z-index:5000;font-family:Inter,sans-serif;font-size:14px;font-weight:700;pointer-events:none;text-align:center;box-shadow:0 4px 18px rgba(0,0,0,.4)';
      _spreadHintEl.innerHTML = 'Yangin baslangic noktasini haritaya tiklayarak secin<br><span style="font-size:11px;font-weight:400;opacity:.85">ESC ile iptal</span>';
      document.querySelector('.map-frame').appendChild(_spreadHintEl);
    }
    function _hideSpreadHint() {
      if (_spreadHintEl) { try { _spreadHintEl.parentNode.removeChild(_spreadHintEl); } catch(e){} _spreadHintEl = null; }
    }

    function toggleSpreadAddMode() {
      _spreadAddMode = !_spreadAddMode;
      const btn = document.getElementById('btnAddFirePoint');
      if (_spreadAddMode) {
        closePanel();
        if (btn) { btn.textContent = 'İptal'; btn.classList.add('btn-primary'); }
        map.getContainer().style.cursor = 'crosshair';
        _showSpreadHint();
        setStatus('Haritaya tıklayarak yangın noktası ekleyin...');
      } else {
        if (btn) { btn.textContent = '+ Yangın Noktası Ekle'; btn.classList.remove('btn-primary'); }
        map.getContainer().style.cursor = '';
        _hideSpreadHint();
        setStatus('');
      }
    }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && _spreadAddMode) toggleSpreadAddMode();
    });

    map.on('click', function(e) {
      if (!_spreadAddMode) return;
      toggleSpreadAddMode();
      createSpreadScenario(e.latlng.lat, e.latlng.lng);
    });

    async function saveMySpreadLocation() {
      setStatus('Konum alınıyor...');
      const pos = await getUserPosition();
      if (!pos) { setStatus('Konum alınamadı'); return; }
      _mySpreadLocation = { lat: pos.lat, lon: pos.lon };
      localStorage.setItem('koru_spread_location', JSON.stringify(_mySpreadLocation));
      _renderMyLocationMarker();
      if (_lastSpreadData) _renderSpreadState(_lastSpreadData);
      setStatus(`Konumunuz kaydedildi: ${pos.lat.toFixed(4)}, ${pos.lon.toFixed(4)}`);
      // Also try to register server-side if token present
      const token = localStorage.getItem('access_token');
      if (token) {
        try {
          await fetch('/api/fire-spread/my-location', {
            method: 'POST',
            headers: {'Content-Type':'application/json', 'Authorization':'Bearer '+token},
            body: JSON.stringify({ lat: pos.lat, lon: pos.lon }),
          });
        } catch(e) {}
      }
    }

    function requestSpreadNotifPermission() {
      if (!('Notification' in window)) { setStatus('Tarayıcınız bildirimleri desteklemiyor'); return; }
      Notification.requestPermission().then(p => {
        setStatus(p === 'granted' ? 'Bildirimler etkinleştirildi' : 'Bildirim izni reddedildi');
      });
    }

    // Mock location: Selçuk Yaşar Kampüsü, Bornova / İzmir
    try {
      _mySpreadLocation = { lat: 38.4537, lon: 27.2183 };
      localStorage.setItem('koru_spread_location', JSON.stringify(_mySpreadLocation));
      _renderMyLocationMarker();
    } catch(e) {}

    loadSpreadScenarios();
  </script>
