  <script>
    // Kontrol: Kullanıcı giriş yapmış mı?
    (function checkLogin(){
      const isLoggedIn = sessionStorage.getItem('isLoggedIn') === 'true';
      if (!isLoggedIn) {
        window.location.href = '/login';
        return;
      }
      
      // Kullanıcı bilgisini göster
      const username = sessionStorage.getItem('username') || 'Kullanıcı';
      const userType = sessionStorage.getItem('userType') || 'user';
      const userDisplay = document.getElementById('userDisplay');
      const userDropdownMenu = document.getElementById('userDropdownMenu');
      const logoutLink = document.getElementById('logoutLink');
      const profileLink = document.getElementById('profileLink');
      
      if (userDisplay) {
        const typeLabel = userType === 'admin' ? 'Kullanıcı - Admin' : 'Kullanıcı';
        userDisplay.textContent = `${typeLabel} - ${username}`;
        userDisplay.innerHTML += ' ▼';
        
        // Dropdown menüyü aç/kapat
        userDisplay.addEventListener('click', function(e) {
          e.stopPropagation();
          userDropdownMenu.classList.toggle('show');
        });
      }
      
      // Sayfa başka yerine tıklanınca menüyü kapat
      document.addEventListener('click', function() {
        if (userDropdownMenu) {
          userDropdownMenu.classList.remove('show');
        }
      });
      
      // Oturum Kapat bağlantısı
      if (logoutLink) {
        logoutLink.addEventListener('click', function(e) {
          e.preventDefault();
          sessionStorage.clear();
          window.location.href = '/login';
        });
      }
      
      // Profil bağlantısı
      if (profileLink) {
        profileLink.addEventListener('click', function(e) {
          e.preventDefault();
          alert(`Profil: ${username} (${userType === 'admin' ? 'Admin' : 'Kullanıcı'})`);
          userDropdownMenu.classList.remove('show');
        });
      }
    })();

    // Ensure logo loads with fallback candidates
    (function ensureLogo(){
      const img = document.getElementById('logoImg');
      if(!img) return;
      const cand = ['/static/img/izmir-logo.png','/static/img/izmir-logo.jpg','/static/img/izmir-logo.jpeg','/static/img/izmir-logo.svg','/static/img/izmir.png'];
      let i = 0;
      function tryNext(){
        if(i >= cand.length){ img.style.display='none'; return; }
        img.src = cand[i] + '?v=3';
        i++;
      }
      img.onerror = tryNext;
      tryNext();
    })();

    // Footer logo loader (tries multiple filenames)
    (function ensureFooterLogo(){
      const img = document.getElementById('footerLogo');
      if(!img) return;
      const cand = ['/static/img/izmir-wordmark.png','/static/img/izmir-wordmark.svg','/static/img/izmir-logo.png','/static/img/izmir.png'];
      let i = 0;
      function tryNext(){ if(i>=cand.length){ img.style.display='none'; return; } img.src=cand[i]+'?v=3'; i++; }
      img.onerror = tryNext; tryNext();
    })();

    // Copy-to-clipboard for footer contact values (hint button)
    (function setupCopyables(){
      function copy(txt){
        if (navigator.clipboard && navigator.clipboard.writeText){
          return navigator.clipboard.writeText(txt);
        }
        return new Promise((resolve)=>{
          const ta=document.createElement('textarea'); ta.value=txt; document.body.appendChild(ta); ta.select();
          try{ document.execCommand('copy'); }catch(_e){} finally{ document.body.removeChild(ta); }
          resolve();
        });
      }
      document.querySelectorAll('.copyable .copy-btn').forEach(btn=>{
        btn.addEventListener('click', (e)=>{
          e.preventDefault(); e.stopPropagation();
          const wrap = btn.closest('.copyable');
          const txt = wrap.getAttribute('data-copy') || wrap.textContent.trim();
          const prev = btn.textContent;
          copy(txt).then(()=>{ btn.textContent='Kopyalandı'; setTimeout(()=>{ btn.textContent=prev; }, 1200); });
        });
      });
    })();

    // Sidebar
    const sidebar = document.getElementById('sidebar');
    const backdrop = document.getElementById('backdrop');
    const menuBtn = document.getElementById('menuBtn');
    function openSidebar(){ sidebar.classList.add('open'); backdrop.classList.add('show'); sidebar.setAttribute('aria-hidden','false'); }
    function closeSidebar(){ sidebar.classList.remove('open'); backdrop.classList.remove('show'); sidebar.setAttribute('aria-hidden','true'); }
    function toggleSidebar(){ if (sidebar.classList.contains('open')) closeSidebar(); else openSidebar(); }
    menuBtn.addEventListener('click', toggleSidebar);
    backdrop.addEventListener('click', closeSidebar);
    window.addEventListener('keydown', (e)=>{ if(e.key==='Escape') closeSidebar(); });

    // Sidebar menu actions
    document.getElementById('mFires').addEventListener('click', (e)=>{ e.preventDefault(); closeSidebar(); document.getElementById('btnLiveTracking').click(); });

    // Panel Toggle
    const panel = document.querySelector('.panel');
    const panelToggle = document.getElementById('panelToggle');
    const panelCloseBtn = document.getElementById('panelCloseBtn');
    const mapFrame = document.querySelector('.map-frame');
    function openPanel(){ panel.classList.add('open'); panelToggle.classList.add('open'); mapFrame.classList.add('panel-open'); }
    function closePanel(){ panel.classList.remove('open'); panelToggle.classList.remove('open'); mapFrame.classList.remove('panel-open'); }
    function togglePanel(){ if (panel.classList.contains('open')) closePanel(); else openPanel(); }
    panelToggle.addEventListener('click', togglePanel);
    panelCloseBtn.addEventListener('click', closePanel);

    async function getUserPosition(){
      return new Promise((resolve)=>{
        if (!navigator.geolocation){ return resolve(null); }
        navigator.geolocation.getCurrentPosition(
          pos => resolve({lat: pos.coords.latitude, lon: pos.coords.longitude}),
          _err => resolve(null),
          {enableHighAccuracy:true, timeout:5000, maximumAge:60000}
        );
      });
    }
    function haversineKm(aLat,aLon,bLat,bLon){
      const R=6371; const toRad=x=>x*Math.PI/180;
      const dLat=toRad(bLat-aLat), dLon=toRad(bLon-aLon);
      const la1=toRad(aLat), la2=toRad(bLat);
      const h = Math.sin(dLat/2)**2 + Math.cos(la1)*Math.cos(la2)*Math.sin(dLon/2)**2;
      return 2*R*Math.asin(Math.sqrt(h));
    }
    document.getElementById('mVolunteer').addEventListener('click', (e)=>{ e.preventDefault(); closeSidebar(); window.open('https://gonullu.afad.gov.tr/', '_blank'); });
    document.getElementById('mContact').addEventListener('click', (e)=>{ e.preventDefault(); closeSidebar(); window.open('https://www.izmir.bel.tr/', '_blank'); });
    const map = L.map('map', {
      zoomControl: false, 
      attributionControl: false
    }).setView([38.42, 27.14], 8);
    
    // Harita katmanları
    const osmLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
      {maxZoom:19, attribution:'&copy; OpenStreetMap'});
    
    const satelliteLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
      {maxZoom:19, attribution:'&copy; Esri'});
    
    // Başlangıçta uydu modunu etkinleştir
    satelliteLayer.addTo(map);
    
    // Default marker icon'u devre dışı bırak (mavi pin'ler gösterilmesini engelle)
    L.Icon.Default.prototype.options.imagePath = '';
    
    // Harita katman seçicisi
    const baseMaps = {
      'Standart': osmLayer,
      'Uydu': satelliteLayer
    };
    L.control.layers(baseMaps, {}, {position: 'topleft', collapsed: true}).addTo(map);

    // İzmir idari sınırı (gerçek poligon)
    map.createPane('izmirBoundary');
    map.getPane('izmirBoundary').style.zIndex = 650; // overlaylerin üstünde
    const IZMIR_BBOX = { minLon:26.230389, minLat:37.818402, maxLon:28.495245, maxLat:39.392935 };
    const izmirBounds = [[IZMIR_BBOX.minLat, IZMIR_BBOX.minLon],[IZMIR_BBOX.maxLat, IZMIR_BBOX.maxLon]];
    let izmirBoundaryLayer = null;
    let izmirPolygons = null; // Poligonlar point-in-polygon için
    
    // Point-in-polygon kontrolü (ray casting algoritması)
    function isPointInPolygon(lat, lon, polygon) {
      const ring = polygon;
      let inside = false;
      const n = ring.length;
      for (let i = 0; i < n; i++) {
        const [x1, y1] = ring[i];
        const [x2, y2] = ring[(i + 1) % n];
        if ((y1 > lat) !== (y2 > lat)) {
          const x_at_lat = (x2 - x1) * (lat - y1) / (y2 - y1) + x1;
          if (lon < x_at_lat) {
            inside = !inside;
          }
        }
      }
      return inside;
    }
    
    // Noktanın İzmir sınırı içinde olup olmadığını kontrol et
    function isInIzmir(lat, lon) {
      if (!izmirPolygons || izmirPolygons.length === 0) return true; // Poligon yoksa kabul et
      for (const polygonRings of izmirPolygons) {
        const outerRing = polygonRings[0];
        const holes = polygonRings.slice(1);
        if (isPointInPolygon(lat, lon, outerRing)) {
          // Dış poligonda. Deliklerde değil mi kontrol et
          let inHole = false;
          for (const hole of holes) {
            if (isPointInPolygon(lat, lon, hole)) {
              inHole = true;
              break;
            }
          }
          if (!inHole) return true;
        }
      }
      return false;
    }
    
    (async function loadIzmirBoundary(){
      try{
        const r = await fetch('/static/data/izmir.geojson');
        if(!r.ok) throw new Error('not_found');
        const gj = await r.json();
        
        // Poligonları parse et
        izmirPolygons = [];
        function extractGeometry(geom) {
          if (!geom) return;
          if (geom.type === 'Polygon') {
            const rings = geom.coordinates.map(ring => ring.map(([lon, lat]) => [lon, lat]));
            izmirPolygons.push(rings);
          } else if (geom.type === 'MultiPolygon') {
            for (const poly of geom.coordinates) {
              const rings = poly.map(ring => ring.map(([lon, lat]) => [lon, lat]));
              izmirPolygons.push(rings);
            }
          }
        }
        
        if (gj.type === 'FeatureCollection') {
          for (const feat of (gj.features || [])) {
            extractGeometry(feat.geometry);
          }
        } else if (gj.type === 'Feature') {
          extractGeometry(gj.geometry);
        } else {
          extractGeometry(gj);
        }
        
        izmirBoundaryLayer = L.geoJSON(gj, {
          pane:'izmirBoundary',
          style: { color:'#8B0000', weight:5, fillOpacity:0, opacity:1, dashArray:'' },
          pointToLayer: () => null  // Point'leri gizle - sadece poligonları göster

    async function loadSheltersXLSX(){
      const r = await fetch('/static/data/assembly_points.xlsx', {cache:'no-cache'});
      if(!r.ok) throw new Error('xlsx_not_found');
      const buf = await r.arrayBuffer();
      const wb = XLSX.read(buf, {type:'array'});
      const wsname = wb.SheetNames[0];
      const ws = wb.Sheets[wsname];
      const rows = XLSX.utils.sheet_to_json(ws, {defval:'', raw:false});
      const feats = [];
      for (const row of rows){
        const obj = {}; Object.keys(row).forEach(k=>obj[normalizeKey(k)] = row[k]);
        const name = obj.name || obj.ad || obj.isim || obj.title || '';
        let lat = obj.lat || obj.latitude || obj.enlem || obj.y;
        let lon = obj.lon || obj.lng || obj.long || obj.longitude || obj.boylam || obj.x;
        if ((lat===undefined || lon===undefined) && (obj.koordinat || obj.konum || obj.location || obj.point || obj.geom || obj.geometry)){
          const pr = parseCoordString(obj.koordinat || obj.konum || obj.location || obj.point || obj.geom || obj.geometry);
          lat = pr.lat; lon = pr.lon;
        }
        const toNum = (v)=>{
          if (typeof v === 'number') return v;
          if (!v) return NaN;
          let s = String(v).trim();
          if (s.includes(',') && !s.includes('.')) s = s.replace(',', '.');
          s = s.replace(/\s/g,'');
          const n = parseFloat(s); return isNaN(n)?NaN:n;
        };
        lat = toNum(lat); lon = toNum(lon);
        if (!isNaN(lat) && !isNaN(lon)){
          feats.push({ type:'Feature', geometry:{ type:'Point', coordinates:[lon,lat] }, properties:{ name, ...obj } });
        }
      }
      return { type:'FeatureCollection', features: feats };
    }
    function detectDelimiter(text){
      if (text.indexOf('\t')>=0) return '\t';
      const semi = (text.match(/;/g)||[]).length;
      const comma = (text.match(/,/g)||[]).length;
      return semi>comma ? ';' : ',';
    }
    function normalizeKey(k){
      if (!k) return '';
      let s = String(k).toLowerCase().trim();
      s = s.replace(/ı/g,'i').replace(/ş/g,'s').replace(/ğ/g,'g').replace(/ç/g,'c').replace(/ö/g,'o').replace(/ü/g,'u');
      s = s.replace(/\([^)]*\)/g,'');
      s = s.replace(/[^a-z0-9_]+/g,'_').replace(/_+/g,'_');
      return s;
    }
    function toNumber(val){
      if (typeof val === 'number') return val;
      if (!val) return NaN;
      let s = String(val).trim();
      if (s.includes(',') && !s.includes('.')) s = s.replace(',', '.');
      s = s.replace(/\s/g,'');
      const n = parseFloat(s);
      return isNaN(n) ? NaN : n;
    }
    function parseCoordString(val){
      if (!val) return {lat:NaN, lon:NaN};
      let s = String(val).trim();
      const m = s.match(/POINT\s*\(\s*([\-0-9\.,\s]+)\)/i);
      if (m) s = m[1];
      s = s.replace(/;/g,',').replace(/\s+/g,' ');
      const parts = s.split(',');
      if (parts.length>=2){
        const a = toNumber(parts[0]);
        const b = toNumber(parts[1]);
        if (a>=25 && a<=35 && b>=35 && b<=45) return {lat:b, lon:a};
        if (a>=35 && a<=45 && b>=25 && b<=35) return {lat:a, lon:b};
        return {lat:a, lon:b};
      }
      const sp = s.split(/\s+/);
      if (sp.length>=2){
        const a = toNumber(sp[0]); const b = toNumber(sp[1]);
        if (a>=25 && a<=35 && b>=35 && b<=45) return {lat:b, lon:a};
        if (a>=35 && a<=45 && b>=25 && b<=35) return {lat:a, lon:b};
        return {lat:a, lon:b};
      }
      return {lat:NaN, lon:NaN};
    }
    function csvToGeoJSON(text){
      const delim = detectDelimiter(text);
      const lines = text.split(/\r?\n/).filter(Boolean);
      if (lines.length < 2) throw new Error('empty_csv');
      const headers = lines[0].split(delim).map(h=>normalizeKey(h));
      const find = (...keys)=> headers.findIndex(h=>keys.includes(h));
      const idxLat = find('lat','latitude','y','enlem');
      const idxLon = find('lon','lng','long','longitude','x','boylam');
      const idxName = find('name','ad','isim','title');
      const idxCoord = find('koordinat','konum','location','point','geom','geometry');
      if ((idxLat<0 || idxLon<0) && idxCoord<0) throw new Error('latlon_missing');
      const feats = [];
      for (let i=1;i<lines.length;i++){
        const cols = lines[i].split(delim);
        let lat = NaN, lon = NaN;
        if (idxCoord>=0){ const pr = parseCoordString(cols[idxCoord]); lat = pr.lat; lon = pr.lon; }
        if (isNaN(lat)||isNaN(lon)){
          if (cols.length>Math.max(idxLat, idxLon)){
            lat = toNumber(cols[idxLat]);
            lon = toNumber(cols[idxLon]);
          }
        }
        if (isNaN(lat)||isNaN(lon)) continue;
        const props = {};
        headers.forEach((h,ix)=>{ props[h] = cols[ix]; });
        props.name = props.name || props.ad || props.isim || props.title || '';
        feats.push({ type:'Feature', geometry:{ type:'Point', coordinates:[lon,lat] }, properties: props });
      }
      return { type:'FeatureCollection', features: feats };
    }

    async function loadSheltersFromFiles(files){

          } else if (ext === 'xlsx' || ext === 'xls'){
            const r = await fetch(url, {cache:'no-cache'}); const buf = await r.arrayBuffer();
            const wb = XLSX.read(buf, {type:'array'}); const ws = wb.Sheets[wb.SheetNames[0]];
            const rows = XLSX.utils.sheet_to_json(ws, {defval:'', raw:false});
            const tmp = { type:'FeatureCollection', features: [] };
            for (const row of rows){
              const obj = {}; Object.keys(row).forEach(k=>obj[normalizeKey(k)] = row[k]);
              let lat = obj.lat || obj.latitude || obj.enlem || obj.y;
              let lon = obj.lon || obj.lng || obj.long || obj.longitude || obj.boylam || obj.x;
              if ((lat===undefined || lon===undefined) && (obj.koordinat || obj.konum || obj.location || obj.point || obj.geom || obj.geometry)){
                const pr = parseCoordString(obj.koordinat || obj.konum || obj.location || obj.point || obj.geom || obj.geometry);
                lat = pr.lat; lon = pr.lon;
              }
              const toNum = (v)=>{ if (typeof v==='number') return v; if(!v) return NaN; let s=String(v).trim(); if(s.includes(',')&&!s.includes('.')) s=s.replace(',', '.'); s=s.replace(/\s/g,''); const n=parseFloat(s); return isNaN(n)?NaN:n; };
              lat = toNum(lat); lon = toNum(lon);
              const name = obj.name || obj.ad || obj.isim || obj.title || '';
              if (!isNaN(lat)&&!isNaN(lon)) tmp.features.push({ type:'Feature', geometry:{ type:'Point', coordinates:[lon,lat] }, properties:{ name, ...obj } });
            }
            add(tmp);
          }
        }catch(e){ console.warn('shelter file parse failed:', url, e); }
      }
      return { type:'FeatureCollection', features: feats };
    }

    function currentBboxParam(){
      const b = map.getBounds();

      const ne = b.getNorthEast();
      const minLon = Math.min(sw.lng, ne.lng);
      const minLat = Math.min(sw.lat, ne.lat);

    async function loadFireRiskPoints() {
      const info = document.getElementById('info');
      info.textContent = 'ML Yangın Risk Noktaları yükleniyor...';
      setStatus('Yangın risk yükleniyor...');
      
      try {
        const response = await fetch('/api/fire-risk/points?limit=50000');
        if (!response.ok) throw new Error('API hatası: ' + response.status);
        
        const geoJson = await response.json();
        
        if (!geoJson.features || geoJson.features.length === 0) {
          info.textContent = 'Yangın risk verisi bulunamadı';
          return;
        }
        
        console.log('Yangın risk noktaları toplam:', geoJson.features.length);
        
        // Filtre: İzmir sınırı içindeki noktalar
        const filteredFeatures = geoJson.features.filter(f => {
          const coords = f.geometry?.coordinates;
          if (!coords || coords.length < 2) return false;
          const [lon, lat] = coords;
          return isInIzmir(lat, lon);
        });
        
        console.log('İzmir içinde:', filteredFeatures.length);
        
        const filteredGj = { type: 'FeatureCollection', features: filteredFeatures };
        
        if (fireRiskLayer) map.removeLayer(fireRiskLayer);
        
        // Önce düşük risk noktalarını ekle (arka planda)
        let lowRiskFeatures = filteredFeatures.filter(f => f.properties.risk_class !== 'HIGH_RISK' && f.properties.risk_class !== 'MEDIUM_RISK');
        let mediumRiskFeatures = filteredFeatures.filter(f => f.properties.risk_class === 'MEDIUM_RISK');
        let highRiskFeatures = filteredFeatures.filter(f => f.properties.risk_class === 'HIGH_RISK');
        
        // Tüm özellikleri birleştir (başta düşük riskler, sonra yüksek riskler)
        const orderedFeatures = [...lowRiskFeatures, ...mediumRiskFeatures, ...highRiskFeatures];
        
        fireRiskLayer = L.geoJSON({type: 'FeatureCollection', features: orderedFeatures}, {
          pointToLayer: (feature, latlng) => {
            const props = feature.properties || {};
            const riskClass = props.risk_class || 'SAFE_UNBURNABLE';
            const color = getFireRiskColor(riskClass);
            
            // Radius boyutu risk sınıfına göre değiş - daha belirgin
            let radius = 3;
            let opacity = 0.5;
            let fillOpacity = 0.4;
            
            if (riskClass === 'HIGH_RISK') {
              radius = 8;
              opacity = 1;
              fillOpacity = 0.85;
            } else if (riskClass === 'MEDIUM_RISK') {
              radius = 6;
              opacity = 0.9;
              fillOpacity = 0.75;
            } else if (riskClass === 'LOW_RISK') {
              radius = 4;
              opacity = 0.7;
              fillOpacity = 0.6;
            }
            
            return L.circleMarker(latlng, {
              radius: radius,
              color: color,
              fillColor: color,
              fillOpacity: fillOpacity,
              weight: 1,
              opacity: opacity
            });
          },
          onEachFeature: (feature, layer) => {
            const props = feature.properties || {};
            const riskClass = props.risk_class || 'SAFE_UNBURNABLE';
            const fireProb = (props.fire_probability * 100).toFixed(1);
            const riskScore = (props.combined_risk_score).toFixed(3);
            
            const popup = `<b>Yangın Risk Analizi</b><br>
              <span style="font-size: 12px;">
              <strong>${getFireRiskLabel(riskClass)}</strong><br>
              Yangın Olasılığı: ${fireProb}%<br>
              Risk Skoru: ${riskScore}<br>
              Konum: (${parseFloat(feature.geometry.coordinates[1]).toFixed(4)}, ${parseFloat(feature.geometry.coordinates[0]).toFixed(4)})</span>`;
            
            layer.bindPopup(popup);
          }
        }).addTo(map);
        
        // Legend ekle
        if (fireRiskLegendCtl) {
          try { fireRiskLegendCtl.remove(); } catch(e) {}
        }
        
        fireRiskLegendCtl = L.control({ position: 'bottomright' });
        fireRiskLegendCtl.onAdd = function() {
          const div = L.DomUtil.create('div', 'legend');
          div.style.backgroundColor = 'white';
          div.style.padding = '10px';
          div.style.borderRadius = '5px';
          div.style.boxShadow = '0 0 15px rgba(0,0,0,0.2)';
          div.style.fontSize = '12px';
          
          div.innerHTML = '<b>Yangın Risk Sınıfları</b><br>' +
            '<div class="row"><span class="sw" style="background:#8b0000; width: 12px; height: 12px; display: inline-block; margin-right: 5px; border-radius: 50%;"></span>Yüksek Risk (' + highRiskFeatures.length + ')</div>' +
            '<div class="row"><span class="sw" style="background:#e74c3c; width: 10px; height: 10px; display: inline-block; margin-right: 5px; border-radius: 50%;"></span>Orta Risk (' + mediumRiskFeatures.length + ')</div>' +
            '<div class="row"><span class="sw" style="background:#f39c12; width: 8px; height: 8px; display: inline-block; margin-right: 5px; border-radius: 50%;"></span>Düşük Risk (' + lowRiskFeatures.filter(f => f.properties.risk_class === 'LOW_RISK').length + ')</div>' +
            '<div class="row"><span class="sw" style="background:#2ecc71; width: 6px; height: 6px; display: inline-block; margin-right: 5px; border-radius: 50%;"></span>Güvenli (' + lowRiskFeatures.filter(f => f.properties.risk_class !== 'LOW_RISK').length + ')</div>';

        info.textContent = `ML Yangın Risk Noktaları açık (${filteredFeatures.length} bulundu)`;
        setStatus(`Yangın risk açık (${filteredFeatures.length})`);
        
      } catch (e) {
        info.textContent = 'Yangın risk yükleme hatası: ' + e.message;
        console.error('Yangın risk yükleme hatası:', e);
      }
    }

    async function loadRiskForView(){
      const info = document.getElementById('info');
      const cellKm = Math.max(2, Math.min(50, parseInt(document.getElementById('cellKm').value||'8',10)));
      info.textContent = 'Risk (contour) hesaplanıyor...'; setStatus('Risk hesaplanıyor...');
      try{
        const url = `/api/risk_grid?cell_km=${cellKm}&use_default_wind=true&${currentBboxParam()}`;
        const r = await fetch(url);
        const grid = await r.json();
        if (grid.error){ info.textContent = 'Risk hata: '+grid.error; return; }
        const {bbox, nrows, ncols, values} = grid;
        const minx=bbox[0], miny=bbox[1], maxx=bbox[2], maxy=bbox[3];
        const dx=(maxx-minx)/(ncols-1); const dy=(maxy-miny)/(nrows-1);
        // Build contours
        const thresholds=[0.2,0.4,0.6,0.8];
        const contours = d3.contours().size([ncols, nrows]).thresholds(thresholds)(values);
        // Build filled isobands: for each threshold polygon, fill area >= threshold
        const feats=[];
        for (const con of contours){
          const val=con.value;
          const multiPoly = [];
          for (const poly of con.coordinates){
            const rings = [];
            for (const ring of poly){
              const coords = ring.map(([x,y])=>[minx + x*dx, miny + y*dy]);
              rings.push(coords);
            }
            multiPoly.push(rings);
          }
          feats.push({
            type:'Feature',
            geometry:{type:'MultiPolygon', coordinates: multiPoly},
            properties:{level:val}
          });
        }
        const geo = {type:'FeatureCollection', features:feats};
        if (riskLayer) map.removeLayer(riskLayer);
        riskLayer = L.geoJSON(geo, { style: f=>({
          color: contourColor(f.properties?.level||0),
          weight: 1,
          opacity: 0.8,
          fillColor: contourColor(f.properties?.level||0),
          fillOpacity: 0.28
        }) }).addTo(map);
        // Legend for contours
        ensureLegend();
        if (legendCtl){ try{ legendCtl.remove(); }catch(e){} }
        legendCtl = L.control({position:'bottomright'});
        legendCtl.onAdd = function(){
          const div = L.DomUtil.create('div','legend');
          div.innerHTML = '<b>Risk (Contours)</b>'+
            '<div class="row"><span class="sw" style="background:#8b0000"></span>≥ 0.8</div>'+
            '<div class="row"><span class="sw" style="background:#d7301f"></span>≥ 0.6</div>'+
            '<div class="row"><span class="sw" style="background:#fc8d59"></span>≥ 0.4</div>'+
            '<div class="row"><span class="sw" style="background:#fdcc8a"></span>≥ 0.2</div>';
          return div;
        };
        legendCtl.addTo(map);
        info.textContent = 'Risk izohips çizgileri açık'; setStatus('Risk katmanı açık');
      }catch(e){ info.textContent = 'Risk hatası'; console.error(e); }
    }

      const c = map.getCenter();
      if (!lastWind || lastWind.error){ await loadWindAtCenter(); }
      const dur = Math.max(5, Math.min(180, parseInt(document.getElementById('dur').value||'30',10)));
      const dir = lastWind?.deg ?? 240;
      const spd = lastWind?.speed_ms ?? 6;
      try{
        const url = `/api/spread?lat=${c.lat}&lon=${c.lng}&wind_dir_deg=${dir}&wind_speed_ms=${spd}&duration_min=${dur}`;
        const r = await fetch(url);
        const geo = await r.json();
        if (spreadLayer) map.removeLayer(spreadLayer);
        spreadLayer = L.geoJSON(geo, { style:{ color:'#d81b60', weight:2, fillColor:'#d81b60', fillOpacity:0.2 } }).addTo(map);
        try{ const b = spreadLayer.getBounds(); if (b.isValid()) map.fitBounds(b.pad(0.2)); }catch(e){}
        info.textContent = `Tahmin çizildi (dir: ${dir.toFixed?.(0)||dir}°, hız: ${spd.toFixed?.(1)||spd} m/s, ${dur} dk)`; setStatus('Yayılım tahmini çizildi');
      }catch(e){ info.textContent = 'Tahmin hatası'; console.error(e); }
    }

    document.getElementById('btnFires').addEventListener('click', loadFires);
    document.getElementById('btnLiveTracking').addEventListener('click', ()=>loadLiveTracking(true));
    document.getElementById('btnFireRisk').addEventListener('click', toggleFireRisk);
    document.getElementById('btnHeatmap').addEventListener('click', toggleHeatmap);
    document.getElementById('btnReservoirs').addEventListener('click', loadReservoirs);
    document.getElementById('btnWaterSources').addEventListener('click', loadWaterSources);
    document.getElementById('btnWaterTanks').addEventListener('click', loadWaterTanks);
    document.getElementById('btnLakes').addEventListener('click', loadLakes);
    document.getElementById('btnBoundaryPoints').addEventListener('click', loadBoundaryPoints);
    document.getElementById('autoRef').addEventListener('change', (e)=> setAutoRefresh(e.target.checked));
    document.getElementById('cellKm').addEventListener('change', ()=>{ if (riskActive) loadRiskForView(); });
    document.getElementById('btnReset').addEventListener('click', resetMap);

    // Harita hareketlerinde risk katmanını güncelle
    map.on('moveend zoomend', ()=>{ if (riskActive) loadRiskForView(); });
    document.getElementById('btnWind').addEventListener('click', loadWindAtCenter);
    document.getElementById('btnSpread').addEventListener('click', drawSpread);

    // Harita açılırken otomatik veri yükleme yapma - kullanıcı Canlı Takip tuşuna tıklayınca yüklenecek
  </script>
</body>
</html>
