<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8"/>
  <title>KORU Yangın Önleme Platformu</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css"/>
  <link rel="icon" type="image/png" href="/static/img/favicon.png"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    :root{ --bg: #050E07; --accent: #F59E0B; --green: #4A7C3A; --green-hi: #6AAD58; --text: #E2F0DA; --text2: #7BA368; --danger: #EF4444; --border: rgba(74,124,58,.18); }
    html,body{height:100%;margin:0}
    body{ box-sizing:border-box; background: var(--bg); }
    .map-frame{ position:absolute; top:76px; left:12px; right:12px; bottom:68px; background:#fff; border:1px solid var(--border); border-radius:12px; box-shadow:0 6px 18px rgba(0,0,0,.25); overflow:hidden; transition:right 0.3s ease }
    #map{height:100%}
    .panel{position:fixed;top:76px;right:0;width:360px;height:calc(100% - 76px - 60px);z-index:9999;background:rgba(8,21,16,.95);padding:16px;border-radius:0;box-shadow:-2px 0 16px rgba(0,0,0,.25);font-family:'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;display:flex;flex-direction:column;gap:12px;overflow-y:auto;transform:translateX(100%);transition:transform 0.3s ease;backdrop-filter:blur(20px);border-left:1px solid var(--border);color:var(--text)}
    .panel.open{transform:translateX(0)}
    .panel-close-btn{position:absolute;top:2px;left:2px;width:24px;height:24px;background:none;border:none;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:all 0.2s ease;padding:0;margin:0;z-index:10001;font-weight:bold}
    .panel-close-btn:hover{color:var(--text);transform:scale(1.1)}
    .panel input{width:56px}
    .panel .section{margin:0;padding:12px 0;display:flex;flex-direction:column;gap:8px;border:none;border-bottom:1px dashed rgba(74,124,58,0.15);padding-right:0}
    .panel .section:last-child{border-bottom:none}
    .panel .section-title{display:block;font-weight:700;font-size:13px;color:var(--accent);margin-bottom:4px}
    .panel .row{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
    .panel label{font-size:11px;color:var(--text2);opacity:.85}
    .panel input[type=number]{height:28px;padding:3px 8px;border:1px solid rgba(74,124,58,.25);border-radius:8px;font-family:inherit;background:rgba(14,30,12,.8);color:var(--text)}
    .panel input[type=number]:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(245,158,11,.15)}
    .panel select{height:28px;padding:3px 8px;border:1px solid rgba(74,124,58,.25);border-radius:8px;font-family:inherit;font-size:12px;background:rgba(14,30,12,.8);color:var(--text);cursor:pointer}
    .panel select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(245,158,11,.15)}
    .panel-toggle{position:absolute;top:12px;right:12px;width:40px;height:40px;background:rgba(8,21,16,.85);color:var(--accent);border:1px solid rgba(74,124,58,.25);border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;transition:all 0.2s ease;padding:0;margin:0;z-index:9998;box-shadow:0 2px 8px rgba(0,0,0,.25)}
    .btn{cursor:pointer; border:1px solid rgba(74,124,58,.2); border-radius:10px; padding:6px 10px; background:rgba(14,30,12,.6); transition:all .15s ease; font-family:'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; font-size:12px; height:30px; color:var(--text) }
    .btn:hover{ box-shadow:0 3px 8px rgba(0,0,0,.2) }
    .btn:active{ transform:translateY(1px) }
    .btn:focus-visible{ outline:none; box-shadow:0 0 0 3px rgba(245,158,11,.25) }
    .btn-primary{ background: linear-gradient(135deg, #D97706, #F59E0B); color:#0A0A0A; border-color: transparent; font-weight:600 }
    .btn-primary:hover{ filter: brightness(1.08); box-shadow:0 5px 12px rgba(245,158,11,.3) }
    .btn-outline{ background:rgba(14,30,12,.6); color: var(--text2); border-color: rgba(74,124,58,.3); }
    .btn-outline:hover{ background: rgba(74,124,58,.15); border-color: var(--accent) }
    #info{ font-size:11px; color:var(--text2); margin-left:6px }
    .legend{background:rgba(8,21,16,.9);padding:6px 8px;border-radius:6px;box-shadow:0 2px 8px rgba(0,0,0,.25);font:12px/1.2 sans-serif;border:1px solid var(--border);color:var(--text)}
    .legend .row{display:flex;align-items:center;margin:2px 0}
    .legend .sw{width:14px;height:14px;margin-right:6px;border:1px solid rgba(74,124,58,.4)}
    .legend.pipeline-legend{background:rgba(255,255,255,.98);border:1px solid rgba(0,0,0,.12);color:#111827;box-shadow:0 8px 24px rgba(0,0,0,.18)}
    .legend.pipeline-legend .row{color:#111827;margin:4px 0}
    .legend.pipeline-legend .sw{border:1px solid rgba(17,24,39,.35)}
    .legend.pipeline-legend .legend-note{margin:6px 0;font-size:10px;line-height:1.45;color:#374151}
    .legend.pipeline-legend .legend-title{font-weight:700;color:#111827}
    .legend.pipeline-legend .legend-subtitle{font-weight:600;margin-top:6px;color:#111827}
    .header{position:absolute;top:0;left:0;right:0;z-index:10000;background:rgba(5,14,7,.92);padding:10px 16px;display:flex;align-items:center;gap:10px;justify-content:flex-start;border-bottom:1px solid var(--border); color:var(--text); flex-wrap:nowrap;backdrop-filter:blur(20px);height:64px}
    .nav-brand{display:flex;align-items:center;gap:8px;flex:0}
    .nav-icon{font-size:24px;display:flex;align-items:center}
    .header .title{color:var(--text); font-family:'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; font-weight:800; font-size:18px; letter-spacing:3px; white-space:nowrap; }
    .header .user-info{ color:var(--text); font-size:12px; font-weight:600; display:flex; align-items:center; gap:10px; white-space:nowrap; margin-left:auto; }
    .header .back-btn{ background:none; color:var(--text); border:none; padding:0; margin:0; cursor:pointer; font-size:18px; font-weight:600; font-family:'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; transition:all 0.2s ease; text-decoration:none; display:inline-block; white-space:nowrap; }
    .header .back-btn:hover{ opacity:0.7; }
    .user-dropdown{ position:relative; display:inline-block }
    .user-dropdown-toggle{ cursor:pointer; padding:4px 0; border:none; background:none; color:var(--text); font-size:12px; font-weight:600; font-family:'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; display:flex; align-items:center; gap:4px }
    .user-dropdown-toggle:hover{ opacity:0.8 }
    .user-dropdown-menu{ position:absolute; top:100%; right:0; background:rgba(8,21,16,.95); border:1px solid var(--border); border-radius:6px; min-width:160px; box-shadow:0 4px 12px rgba(0,0,0,.25); opacity:0; pointer-events:none; transform:translateY(-4px); transition:all 0.2s ease; z-index:10001; margin-top:6px; backdrop-filter:blur(20px) }
    .user-dropdown-menu.show{ opacity:1; pointer-events:auto; transform:translateY(0) }
    .user-dropdown-menu a{ display:block; padding:10px 14px; color:var(--text2); text-decoration:none; border-bottom:1px solid var(--border); font-size:12px; font-weight:600; font-family:'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; white-space:nowrap; cursor:pointer }
    .user-dropdown-menu a:last-child{ border-bottom:none }
    .user-dropdown-menu a:hover{ background:rgba(74,124,58,.12) }
    .logo{height:42px;width:auto; background: transparent; display:block}
    .brand-link{ text-decoration:none; color:inherit; display:flex; align-items:center; }
    .hamburger{width:32px;height:24px;display:inline-flex;flex-direction:column;justify-content:space-between;cursor:pointer;background:transparent;border:none;padding:0;margin:0}
    .hamburger span{display:block;height:3px;background:var(--text);border-radius:2px;opacity:0.9}
    .sidebar{position:fixed;top:0;right:0;bottom:0;width:300px;background:rgba(5,14,7,.97);color:var(--text);box-shadow:-2px 0 16px rgba(0,0,0,.25);transform:translateX(100%);transition:transform .25s ease;z-index:10050;display:flex;flex-direction:column}
    .sidebar.open{transform:translateX(0)}
    .sidebar a{padding:14px 18px;color:var(--text);text-decoration:none;border-bottom:1px solid var(--border);display:block}
    .sidebar, .sidebar a{ font-family:'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif }
    .sidebar a{ font-weight:600; letter-spacing:.2px }
    .sidebar a:hover{background:rgba(74,124,58,.12)}
    .backdrop{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:10040;opacity:0;pointer-events:none;transition:opacity .2s}
    .backdrop.show{opacity:1;pointer-events:auto}
    .status{ margin-left:auto; font:600 12px/1.2 sans-serif; color:var(--text2) }
    .footer{ position:absolute; left:0; right:0; bottom:0; height:60px; background:rgba(5,14,7,.92); display:flex; align-items:center; justify-content:space-between; padding:0 16px; border-top:1px solid var(--border) }
    .footer img{ height:52px; width:auto; display:block; max-width:50vw; object-fit:contain }
    .footer .contact{ font-family:'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; font-weight:600; font-size:12px; line-height:1; color: var(--text2); display:flex; align-items:center; gap:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; justify-content:flex-end }
    .footer .contact a{ color: var(--text2); text-decoration:none }
    .footer .contact a:hover{ text-decoration:underline }
    .footer .contact strong{ font-weight:800 }
    .copyable{ position:relative; display:inline-flex; align-items:center; gap:6px; color: var(--text2); padding:0 2px }
    .copy-btn{ display:none; font-family:'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; font-weight:700; font-size:11px; color:#0A0A0A; background: var(--accent); border:none; border-radius:10px; padding:2px 8px; cursor:pointer; line-height:1 }
    .copyable:hover .copy-btn{ display:inline-block }
    .proximity-popup{ z-index: 2000 !important; }
    .leaflet-popup-pane{ z-index: 2000 !important; }

    /* ═══ ACCORDION PANEL ═══ */
    .acc{border-bottom:1px solid rgba(74,124,58,.12)}
    .acc:last-of-type{border-bottom:none}
    .acc-head{display:flex;align-items:center;gap:8px;padding:12px 0;cursor:pointer;user-select:none;transition:color .2s}
    .acc-head:hover{color:var(--accent)}
    .acc-icon{flex-shrink:0;width:28px;height:28px;display:flex;align-items:center;justify-content:center;background:rgba(74,124,58,.1);border-radius:8px}
    .acc-icon svg{width:14px;height:14px;stroke:var(--text2);stroke-width:1.5;fill:none;stroke-linecap:round;stroke-linejoin:round}
    .acc-label{font-size:12px;font-weight:700;letter-spacing:.5px;flex:1;color:var(--text)}
    .acc-count{font-size:10px;font-weight:600;color:var(--text2);background:rgba(74,124,58,.12);border-radius:10px;padding:2px 8px}
    .acc-arrow{font-size:10px;color:var(--text2);transition:transform .25s ease;margin-left:4px}
    .acc.open .acc-arrow{transform:rotate(180deg)}
    .acc-body{max-height:0;overflow:hidden;transition:max-height .3s ease}
    .acc.open .acc-body{max-height:400px}
    .acc-body .row{display:flex;gap:6px;align-items:center;flex-wrap:wrap;padding:0 0 12px 0}
    @media (max-width:480px){ .panel{width:100%;top:76px;right:0;height:calc(100% - 76px - 60px);transform:translateX(100%)} .panel-toggle{right:12px} .panel-toggle.open{right:12px} .map-frame{top:88px; left:8px; right:8px; bottom:68px; border-width:1px} .header{padding:10px 12px} .logo{height:34px} .header .title{font-size:14px; letter-spacing:.05px; white-space:nowrap} .footer{height:64px} .footer img{height:44px; max-width:45vw} .footer .contact{font-size:11px} }
  </style>
</head>
<body>

  <div class="footer">

      <span><strong>Telefon:</strong> <span class="copyable" data-copy="153"><span class="copy-val">153</span><button type="button" class="copy-btn" aria-label="Kopyala">Kopyala</button></span></span>
      <span><strong>Faks:</strong> <span class="copyable" data-copy="(0232) 293 39 95"><span class="copy-val">(0232) 293 39 95</span><button type="button" class="copy-btn" aria-label="Kopyala">Kopyala</button></span></span>
      <span><strong>E-Posta:</strong> <span class="copyable" data-copy="him@izmir.bel.tr"><a href="mailto:him@izmir.bel.tr">him@izmir.bel.tr</a><button type="button" class="copy-btn" aria-label="Kopyala">Kopyala</button></span></span>

  </div>

    <a href="#" id="mFires">İzmir Yangınları</a>
    <a href="#" id="mVolunteer">AFAD Gönüllüsü olun</a>

    <!-- Su Kaynakları -->

      <div class="acc-head" onclick="this.parentElement.classList.toggle('open')">

      </div>
      <div id="firePointInfo" style="display:none; margin-top:10px; padding:10px; border:1px solid var(--border); border-radius:8px; background:rgba(14,30,12,.6); font-size:12px; color:var(--text);"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
  <script src="https://d3js.org/d3-contour.v2.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script>
    (function checkLogin(){
      const accessToken = sessionStorage.getItem('access_token');
      if (!accessToken) {
        window.location.replace('/login');
        return;
      }

      const username = sessionStorage.getItem('username') || 'Kullanıcı';
      const userType = sessionStorage.getItem('role') || 'user';
      const userDisplay = document.getElementById('userDisplay');
      const userDropdownMenu = document.getElementById('userDropdownMenu');
      const logoutLink = document.getElementById('logoutLink');
      const profileLink = document.getElementById('profileLink');

      if (userDisplay) {
        const typeLabel = userType === 'admin' ? 'Kullanıcı - Admin' : 'Kullanıcı';
        userDisplay.textContent = `${typeLabel} - ${username}`;
        userDisplay.innerHTML += ' ▼';

        userDisplay.addEventListener('click', function(e) {
          e.stopPropagation();
          if (userDropdownMenu) userDropdownMenu.classList.toggle('show');
        });
      }

      document.addEventListener('click', function() {
        if (userDropdownMenu) {
          userDropdownMenu.classList.remove('show');
        }
      });

      if (logoutLink) {
        logoutLink.addEventListener('click', function(e) {
          e.preventDefault();
          sessionStorage.removeItem('access_token');
          sessionStorage.removeItem('username');
          sessionStorage.removeItem('role');
          window.location.replace('/login');
        });
      }

      if (profileLink) {
        profileLink.addEventListener('click', function(e) {
          e.preventDefault();
          alert(`Profil: ${username} (${userType === 'admin' ? 'Admin' : 'Kullanıcı'})`);
          if (userDropdownMenu) userDropdownMenu.classList.remove('show');
        });
      }
    })();

    (function ensureLogo(){
      const img = document.getElementById('logoImg');
      if(!img) return;
      const cand = ['/static/img/izmir-logo.png','/static/img/izmir-logo.jpg','/static/img/izmir-logo.jpeg','/static/img/izmir-logo.svg','/static/img/izmir.png'];
      let i = 0;
      function tryNext(){
        if(i >= cand.length){ img.style.display='none'; return; }
        img.src = cand[i] + '?v=3';
        i++;
      }
      img.onerror = tryNext;
      tryNext();
    })();

    (function ensureFooterLogo(){
      const img = document.getElementById('footerLogo');
      if(!img) return;
      const cand = ['/static/img/izmir-wordmark.png','/static/img/izmir-wordmark.svg','/static/img/izmir-logo.png','/static/img/izmir.png'];
      let i = 0;
      function tryNext(){ if(i>=cand.length){ img.style.display='none'; return; } img.src=cand[i]+'?v=3'; i++; }
      img.onerror = tryNext; tryNext();
    })();

    (function setupCopyables(){
      function copy(txt){
        if (navigator.clipboard && navigator.clipboard.writeText){
          return navigator.clipboard.writeText(txt);
        }
        return new Promise((resolve)=>{
          const ta=document.createElement('textarea'); ta.value=txt; document.body.appendChild(ta); ta.select();

    function haversineKm(aLat,aLon,bLat,bLon){
      const R=6371; const toRad=x=>x*Math.PI/180;
      const dLat=toRad(bLat-aLat), dLon=toRad(bLon-aLon);
      const la1=toRad(aLat), la2=toRad(bLat);
      const h = Math.sin(dLat/2)**2 + Math.cos(la1)*Math.cos(la2)*Math.sin(dLon/2)**2;
      return 2*R*Math.asin(Math.sqrt(h));
    }

    function isPointInPolygon(lat, lon, polygon) {
      const ring = polygon;
      let inside = false;
      const n = ring.length;
      for (let i = 0; i < n; i++) {
        const [x1, y1] = ring[i];
        const [x2, y2] = ring[(i + 1) % n];
        if ((y1 > lat) !== (y2 > lat)) {
          const x_at_lat = (x2 - x1) * (lat - y1) / (y2 - y1) + x1;
          if (lon < x_at_lat) {
            inside = !inside;
          }
        }
      }
      return inside;
    }

    function isInIzmir(lat, lon) {
      if (!izmirPolygons || izmirPolygons.length === 0) return true;
      for (const polygonRings of izmirPolygons) {
        const outerRing = polygonRings[0];
        const holes = polygonRings.slice(1);
        if (isPointInPolygon(lat, lon, outerRing)) {
          let inHole = false;
          for (const hole of holes) {
            if (isPointInPolygon(lat, lon, hole)) {
              inHole = true;
              break;
            }
          }
          if (!inHole) return true;
        }
      }
      return false;
    }

        izmirPolygons = [];
        function extractGeometry(geom) {
          if (!geom) return;
          if (geom.type === 'Polygon') {
            const rings = geom.coordinates.map(ring => ring.map(([lon, lat]) => [lon, lat]));
            izmirPolygons.push(rings);
          } else if (geom.type === 'MultiPolygon') {
            for (const poly of geom.coordinates) {
              const rings = poly.map(ring => ring.map(([lon, lat]) => [lon, lat]));
              izmirPolygons.push(rings);
            }
          }
        }

        if (gj.type === 'FeatureCollection') {
          for (const feat of (gj.features || [])) {
            extractGeometry(feat.geometry);

        } else if (gj.type === 'Feature') {
          extractGeometry(gj.geometry);
        } else {
          extractGeometry(gj);

    async function loadSheltersXLSX(){
      const r = await fetch('/static/data/assembly_points.xlsx', {cache:'no-cache'});
      if(!r.ok) throw new Error('xlsx_not_found');
      const buf = await r.arrayBuffer();
      const wb = XLSX.read(buf, {type:'array'});
      const wsname = wb.SheetNames[0];
      const ws = wb.Sheets[wsname];
      const rows = XLSX.utils.sheet_to_json(ws, {defval:'', raw:false});
      const feats = [];
      for (const row of rows){
        const obj = {}; Object.keys(row).forEach(k=>obj[normalizeKey(k)] = row[k]);
        const name = obj.name || obj.ad || obj.isim || obj.title || '';
        let lat = obj.lat || obj.latitude || obj.enlem || obj.y;
        let lon = obj.lon || obj.lng || obj.long || obj.longitude || obj.boylam || obj.x;
        if ((lat===undefined || lon===undefined) && (obj.koordinat || obj.konum || obj.location || obj.point || obj.geom || obj.geometry)){
          const pr = parseCoordString(obj.koordinat || obj.konum || obj.location || obj.point || obj.geom || obj.geometry);
          lat = pr.lat; lon = pr.lon;
        }
        const toNum = (v)=>{
          if (typeof v === 'number') return v;
          if (!v) return NaN;
          let s = String(v).trim();
          if (s.includes(',') && !s.includes('.')) s = s.replace(',', '.');
          s = s.replace(/\s/g,'');
          const n = parseFloat(s); return isNaN(n)?NaN:n;
        };
        lat = toNum(lat); lon = toNum(lon);
        if (!isNaN(lat) && !isNaN(lon)){
          feats.push({ type:'Feature', geometry:{ type:'Point', coordinates:[lon,lat] }, properties:{ name, ...obj } });
        }
      }
      return { type:'FeatureCollection', features: feats };
    }
    function detectDelimiter(text){
      if (text.indexOf('\t')>=0) return '\t';
      const semi = (text.match(/;/g)||[]).length;
      const comma = (text.match(/,/g)||[]).length;
      return semi>comma ? ';' : ',';
    }
    function normalizeKey(k){
      if (!k) return '';
      let s = String(k).toLowerCase().trim();
      s = s.replace(/ı/g,'i').replace(/ş/g,'s').replace(/ğ/g,'g').replace(/ç/g,'c').replace(/ö/g,'o').replace(/ü/g,'u');
      s = s.replace(/\([^)]*\)/g,'');
      s = s.replace(/[^a-z0-9_]+/g,'_').replace(/_+/g,'_');
      return s;
    }
    function toNumber(val){
      if (typeof val === 'number') return val;
      if (!val) return NaN;
      let s = String(val).trim();
      if (s.includes(',') && !s.includes('.')) s = s.replace(',', '.');
      s = s.replace(/\s/g,'');
      const n = parseFloat(s);
      return isNaN(n) ? NaN : n;
    }
    function parseCoordString(val){
      if (!val) return {lat:NaN, lon:NaN};
      let s = String(val).trim();
      const m = s.match(/POINT\s*\(\s*([\-0-9\.,\s]+)\)/i);
      if (m) s = m[1];
      s = s.replace(/;/g,',').replace(/\s+/g,' ');
      const parts = s.split(',');
      if (parts.length>=2){
        const a = toNumber(parts[0]);
        const b = toNumber(parts[1]);
        if (a>=25 && a<=35 && b>=35 && b<=45) return {lat:b, lon:a};
        if (a>=35 && a<=45 && b>=25 && b<=35) return {lat:a, lon:b};
        return {lat:a, lon:b};
      }
      const sp = s.split(/\s+/);
      if (sp.length>=2){
        const a = toNumber(sp[0]); const b = toNumber(sp[1]);
        if (a>=25 && a<=35 && b>=35 && b<=45) return {lat:b, lon:a};
        if (a>=35 && a<=45 && b>=25 && b<=35) return {lat:a, lon:b};
        return {lat:a, lon:b};
      }
      return {lat:NaN, lon:NaN};
    }
    function csvToGeoJSON(text){
      const delim = detectDelimiter(text);
      const lines = text.split(/\r?\n/).filter(Boolean);
      if (lines.length < 2) throw new Error('empty_csv');
      const headers = lines[0].split(delim).map(h=>normalizeKey(h));
      const find = (...keys)=> headers.findIndex(h=>keys.includes(h));
      const idxLat = find('lat','latitude','y','enlem');
      const idxLon = find('lon','lng','long','longitude','x','boylam');
      const idxName = find('name','ad','isim','title');
      const idxCoord = find('koordinat','konum','location','point','geom','geometry');
      if ((idxLat<0 || idxLon<0) && idxCoord<0) throw new Error('latlon_missing');
      const feats = [];
      for (let i=1;i<lines.length;i++){
        const cols = lines[i].split(delim);
        let lat = NaN, lon = NaN;
        if (idxCoord>=0){ const pr = parseCoordString(cols[idxCoord]); lat = pr.lat; lon = pr.lon; }
        if (isNaN(lat)||isNaN(lon)){
          if (cols.length>Math.max(idxLat, idxLon)){
            lat = toNumber(cols[idxLat]);
            lon = toNumber(cols[idxLon]);
          }
        }
        if (isNaN(lat)||isNaN(lon)) continue;
        const props = {};
        headers.forEach((h,ix)=>{ props[h] = cols[ix]; });
        props.name = props.name || props.ad || props.isim || props.title || '';
        feats.push({ type:'Feature', geometry:{ type:'Point', coordinates:[lon,lat] }, properties: props });
      }
      return { type:'FeatureCollection', features: feats };
    }

    async function loadSheltersFromFiles(files){
      const feats = [];
      const add = (gj)=>{ if (gj && gj.features) gj.features.forEach(f=>feats.push(f)); };
      for (const url of files){
        const ext = url.split('.').pop().toLowerCase();
        try{
          if (ext === 'geojson' || ext === 'json'){
            const r = await fetch(url, {cache:'no-cache'}); add(await r.json());
          } else if (ext === 'csv'){
            const r = await fetch(url, {cache:'no-cache'}); add(csvToGeoJSON(await r.text()));
          } else if (ext === 'xlsx' || ext === 'xls'){
            const r = await fetch(url, {cache:'no-cache'}); const buf = await r.arrayBuffer();
            const wb = XLSX.read(buf, {type:'array'}); const ws = wb.Sheets[wb.SheetNames[0]];
            const rows = XLSX.utils.sheet_to_json(ws, {defval:'', raw:false});
            const tmp = { type:'FeatureCollection', features: [] };
            for (const row of rows){
              const obj = {}; Object.keys(row).forEach(k=>obj[normalizeKey(k)] = row[k]);
              let lat = obj.lat || obj.latitude || obj.enlem || obj.y;
              let lon = obj.lon || obj.lng || obj.long || obj.longitude || obj.boylam || obj.x;
              if ((lat===undefined || lon===undefined) && (obj.koordinat || obj.konum || obj.location || obj.point || obj.geom || obj.geometry)){
                const pr = parseCoordString(obj.koordinat || obj.konum || obj.location || obj.point || obj.geom || obj.geometry);
                lat = pr.lat; lon = pr.lon;
              }
              const toNum = (v)=>{ if (typeof v==='number') return v; if(!v) return NaN; let s=String(v).trim(); if(s.includes(',')&&!s.includes('.')) s=s.replace(',', '.'); s=s.replace(/\s/g,''); const n=parseFloat(s); return isNaN(n)?NaN:n; };
              lat = toNum(lat); lon = toNum(lon);
              const name = obj.name || obj.ad || obj.isim || obj.title || '';
              if (!isNaN(lat)&&!isNaN(lon)) tmp.features.push({ type:'Feature', geometry:{ type:'Point', coordinates:[lon,lat] }, properties:{ name, ...obj } });
            }
            add(tmp);
          }
        }catch(e){ console.warn('shelter file parse failed:', url, e); }
      }
      return { type:'FeatureCollection', features: feats };
    }

    async function loadFireRiskPoints() {
      const info = document.getElementById('info');
      info.textContent = 'ML Yangın Risk Noktaları yükleniyor...';
      setStatus('Yangın risk yükleniyor...');

      try {
        const response = await fetch('/api/fire-risk/points?limit=50000');
        if (!response.ok) throw new Error('API hatası: ' + response.status);

        const geoJson = await response.json();

        if (!geoJson.features || geoJson.features.length === 0) {
          info.textContent = 'Yangın risk verisi bulunamadı';
          return;
        }

        console.log('Yangın risk noktaları toplam:', geoJson.features.length);

        const filteredFeatures = geoJson.features.filter(f => {
          const coords = f.geometry?.coordinates;
          if (!coords || coords.length < 2) return false;
          const [lon, lat] = coords;
          return isInIzmir(lat, lon);
        });

        console.log('İzmir içinde:', filteredFeatures.length);

        if (fireRiskLayer) map.removeLayer(fireRiskLayer);

        let lowRiskFeatures = filteredFeatures.filter(f => f.properties.risk_class !== 'HIGH_RISK' && f.properties.risk_class !== 'MEDIUM_RISK');
        let mediumRiskFeatures = filteredFeatures.filter(f => f.properties.risk_class === 'MEDIUM_RISK');
        let highRiskFeatures = filteredFeatures.filter(f => f.properties.risk_class === 'HIGH_RISK');
        const orderedFeatures = [...lowRiskFeatures, ...mediumRiskFeatures, ...highRiskFeatures];

        fireRiskLayer = L.geoJSON({type: 'FeatureCollection', features: orderedFeatures}, {
          pointToLayer: (feature, latlng) => {
            const props = feature.properties || {};
            const riskClass = props.risk_class || 'SAFE_UNBURNABLE';
            const color = getFireRiskColor(riskClass);

            let radius = 3;
            let opacity = 0.5;
            let fillOpacity = 0.4;

            if (riskClass === 'HIGH_RISK') {
              radius = 8;
              opacity = 1;
              fillOpacity = 0.85;
            } else if (riskClass === 'MEDIUM_RISK') {
              radius = 6;
              opacity = 0.9;
              fillOpacity = 0.75;
            } else if (riskClass === 'LOW_RISK') {
              radius = 4;
              opacity = 0.7;
              fillOpacity = 0.6;
            }

            return L.circleMarker(latlng, {
              radius: radius,
              color: color,
              fillColor: color,
              fillOpacity: fillOpacity,
              weight: 1,
              opacity: opacity
            });
          },
          onEachFeature: (feature, layer) => {

              Konum: (${parseFloat(feature.geometry.coordinates[1]).toFixed(4)}, ${parseFloat(feature.geometry.coordinates[0]).toFixed(4)})</span>`;

            layer.bindPopup(popup);
          }
        }).addTo(map);

        if (fireRiskLegendCtl) {
          try { fireRiskLegendCtl.remove(); } catch(e) {}
        }

        fireRiskLegendCtl = L.control({ position: 'bottomright' });
        fireRiskLegendCtl.onAdd = function() {

    async function ensureOptimizationScenario() {
      const nInput = document.getElementById('pipelineN');
      const kInput = document.getElementById('pipelineK');
      const n = Math.max(1, parseInt(nInput?.value || '20', 10) || 20);
      const k = Math.max(1, parseInt(kInput?.value || '4', 10) || 4);
      const key = `${n}-${k}`;
      if (lastOptimizationScenarioKey === key) {
        return { n, k };
      }

      const info = document.getElementById('info');
      info.textContent = `Pipeline calisiyor (n=${n}, k=${k})...`;
      setStatus(`Pipeline calisiyor (n=${n}, k=${k})...`);

      const pipeRes = await fetch('/api/optimize/pipeline', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ n, k }),
      });
      if (!pipeRes.ok) throw new Error('Pipeline API hatasi: ' + pipeRes.status);
      const pipeData = await pipeRes.json();
      if (!pipeData.success) throw new Error(pipeData.error || 'Pipeline basarisiz');

      info.textContent = 'SA/GA optimizasyonu calisiyor...';
      setStatus('SA/GA optimizasyonu calisiyor...');
      const runRes = await fetch('/api/optimize/run', { method: 'POST' });
      if (!runRes.ok) throw new Error('Optimize run API hatasi: ' + runRes.status);
      const runData = await runRes.json();
      if (!runData.success) throw new Error(runData.error || 'SA/GA basarisiz');

      lastOptimizationScenarioKey = key;
      return { n, k };
    }

    async function loadOptimizationRoutes(algorithm) {
      const info = document.getElementById('info');
      const algo = String(algorithm || '').toUpperCase();
      if (algo !== 'SA' && algo !== 'GA') return;

      try {
        const { k } = await ensureOptimizationScenario();

        optimizationRouteLayers = optimizationRouteLayers.filter(layer => {
          if (layer && layer._algorithm === algo) {
            try { map.removeLayer(layer); } catch (e) {}
            return false;
          }
          return true;
        });
        routeIndex = routeIndex.filter(r => r.algorithm !== algo);

        info.textContent = `${algo} rotalari yukleniyor...`;
        setStatus(`${algo} rotalari yukleniyor...`);
        const res = await fetch(`/api/optimize/${algo.toLowerCase()}`);
        if (!res.ok) throw new Error('API hatasi: ' + res.status);
        const data = await res.json();
        const stations = Array.isArray(data.stations) ? data.stations : [];
        if (!stations.length) throw new Error('Rota bulunamadi');

        if (!map.getPane('routePane')) {
          map.createPane('routePane');
          map.getPane('routePane').style.zIndex = 780;
        }

        const features = [];
        stations.forEach(station => {
          const vehicles = Array.isArray(station.vehicles) ? station.vehicles : [];
          const lineParts = [];
          vehicles.forEach(v => {
            const points = Array.isArray(v.polyline) ? v.polyline : [];
            const coords = points
              .filter(p => Array.isArray(p) && p.length >= 2)
              .map(p => [Number(p[1]), Number(p[0])]);
            if (coords.length >= 2) lineParts.push(coords);
          });
          if (!lineParts.length) return;

          const routeId = `${algo}-${station.station_id}`;
          routeIndex.push({
            route_id: routeId,
            algorithm: algo,
            station_id: station.station_id,
            distance: station.total_distance || 0,
          });
          features.push({
            type: 'Feature',
            geometry: { type: 'MultiLineString', coordinates: lineParts },
            properties: {
              route_id: routeId,
              algorithm: algo,
              station_id: station.station_id,
              station_name: station.station_name || `Station ${station.station_id}`,
              distance: station.total_distance || 0,
              vehicle_count: vehicles.length || 1,
              fire_point_count: Array.isArray(station.assigned_fire_points) ? station.assigned_fire_points.length : 0,
              cluster_target: k,
              base_color: getAlgoColor(algo),
            }
          });
        });

        if (!features.length) throw new Error('Polyline cizilemedi');

        const layer = L.geoJSON({ type: 'FeatureCollection', features }, {
          pane: 'routePane',
          style: routeStyle,
          onEachFeature: (feature, routeLayer) => {
            const p = feature.properties || {};
            routeLayer.bindPopup(
              `<b>${p.algorithm} Rota</b><br>` +
              `<strong>Istasyon:</strong> ${p.station_name} (${p.station_id})<br>` +
              `<strong>Arac sayisi:</strong> ${p.vehicle_count}<br>` +
              `<strong>Atanan nokta:</strong> ${p.fire_point_count}<br>` +
              `<strong>Toplam mesafe:</strong> ${Number(p.distance || 0).toFixed(2)} km<br>` +
              `<strong>Hedef kume:</strong> ${p.cluster_target}`
            );
          }
        }).addTo(map);

        layer._algorithm = algo;
        optimizationRouteLayers.push(layer);
        ensureRouteLegend();
        rebuildRouteSelect();
        refreshRouteStyles();

        info.textContent = `${algo} rotalari aktif (${features.length} rota)`;
        setStatus(`${algo} rotalari aktif (${features.length} rota)`);
      } catch (e) {
        info.textContent = `${algo} rota hatasi: ${e.message}`;
        console.error(`${algo} route error:`, e);
      }
    }

    async function loadRiskForView(){
      const info = document.getElementById('info');
      const cellInput = document.getElementById('cellKm');
      const cellKm = Math.max(2, Math.min(50, parseInt((cellInput?.value)||'8',10)));
      info.textContent = 'Risk (contour) hesaplanıyor...'; setStatus('Risk hesaplanıyor...');
      try{
        const url = `/api/risk_grid?cell_km=${cellKm}&use_default_wind=true&${currentBboxParam()}`;
        const r = await fetch(url);
        const grid = await r.json();
        if (grid.error){ info.textContent = 'Risk hata: '+grid.error; return; }
        const {bbox, nrows, ncols, values} = grid;
        const minx=bbox[0], miny=bbox[1], maxx=bbox[2], maxy=bbox[3];
        const dx=(maxx-minx)/(ncols-1); const dy=(maxy-miny)/(nrows-1);
        const thresholds=[0.2,0.4,0.6,0.8];
        const contours = d3.contours().size([ncols, nrows]).thresholds(thresholds)(values);
        const feats=[];
        for (const con of contours){
          const val=con.value;
          const multiPoly = [];
          for (const poly of con.coordinates){
            const rings = [];
            for (const ring of poly){
              const coords = ring.map(([x,y])=>[minx + x*dx, miny + y*dy]);
              rings.push(coords);
            }
            multiPoly.push(rings);
          }
          feats.push({
            type:'Feature',
            geometry:{type:'MultiPolygon', coordinates: multiPoly},
            properties:{level:val}
          });
        }
        const geo = {type:'FeatureCollection', features:feats};
        if (riskLayer) map.removeLayer(riskLayer);
        riskLayer = L.geoJSON(geo, { style: f=>({
          color: contourColor(f.properties?.level||0),
          weight: 1,
          opacity: 0.8,
          fillColor: contourColor(f.properties?.level||0),
          fillOpacity: 0.28
        }) }).addTo(map);

        ensureLegend();
        if (legendCtl){ try{ legendCtl.remove(); }catch(e){} }
        legendCtl = L.control({position:'bottomright'});
        legendCtl.onAdd = function(){
          const div = L.DomUtil.create('div','legend');
          div.innerHTML = '<b>Risk (Contours)</b>'+
            '<div class="row"><span class="sw" style="background:#8b0000"></span>≥ 0.8</div>'+
            '<div class="row"><span class="sw" style="background:#d7301f"></span>≥ 0.6</div>'+
            '<div class="row"><span class="sw" style="background:#fc8d59"></span>≥ 0.4</div>'+
            '<div class="row"><span class="sw" style="background:#fdcc8a"></span>≥ 0.2</div>';
          return div;
        };
        legendCtl.addTo(map);
        info.textContent = 'Risk izohips çizgileri açık'; setStatus('Risk katmanı açık');
      }catch(e){ info.textContent = 'Risk hatası'; console.error(e); }
    }

    async function loadWindAtCenter(){
      const info = document.getElementById('info');
      const c = map.getCenter();
      info.textContent = 'Rüzgâr sorgulanıyor...'; setStatus('Rüzgâr sorgulanıyor...');
      try{
        const r = await fetch(`/api/wind?lat=${c.lat}&lon=${c.lng}`);
        lastWind = await r.json();
        if (lastWind.error){ info.textContent='Rüzgâr hata: '+lastWind.error; return; }
        info.textContent = `Rüzgâr: ${lastWind.speed_ms?.toFixed(1)||'-'} m/s @ ${lastWind.deg?.toFixed(0)||'-'}° (${lastWind.source})`; setStatus('Rüzgâr güncellendi');
      }catch(e){ info.textContent = 'Ağ hatası'; console.error(e); }
    }

    async function drawSpread(){
      const info = document.getElementById('info');
      const c = map.getCenter();
      const durInput = document.getElementById('dur');
      if (!lastWind || lastWind.error){ await loadWindAtCenter(); }
      const dur = Math.max(5, Math.min(180, parseInt((durInput?.value)||'30',10)));
      const dir = lastWind?.deg ?? 240;
      const spd = lastWind?.speed_ms ?? 6;
      try{
        const url = `/api/spread?lat=${c.lat}&lon=${c.lng}&wind_dir_deg=${dir}&wind_speed_ms=${spd}&duration_min=${dur}`;
        const r = await fetch(url);
        const geo = await r.json();
        if (spreadLayer) map.removeLayer(spreadLayer);
        spreadLayer = L.geoJSON(geo, { style:{ color:'#d81b60', weight:2, fillColor:'#d81b60', fillOpacity:0.2 } }).addTo(map);
        try{ const b = spreadLayer.getBounds(); if (b.isValid()) map.fitBounds(b.pad(0.2)); }catch(e){}
        info.textContent = `Tahmin çizildi (dir: ${dir.toFixed?.(0)||dir}°, hız: ${spd.toFixed?.(1)||spd} m/s, ${dur} dk)`; setStatus('Yayılım tahmini çizildi');
      }catch(e){ info.textContent = 'Tahmin hatası'; console.error(e); }
    }

        'GOOD': '#3498db',
        'MODERATE': '#f39c12',
        'DIFFICULT': '#e74c3c',
        'RESTRICTED': '#8b0000'
      };
      return colors[level] || '#999';
    }

    function getAccessibilityIcon(level) {
      const icons = {
        'EXCELLENT': '✅',
        'GOOD': '👍',
        'MODERATE': '⚠️',
        'DIFFICULT': '⛔',
        'RESTRICTED': '🚫'
      };
      return icons[level] || '❓';
    }

    async function loadAirAccessibility() {
      const info = document.getElementById('info');
      info.textContent = 'Hava erişilebilirliği yükleniyor...';
      setStatus('Hava erişilebilirliği yükleniyor...');

      try {
        const bounds = map.getBounds();
        const request = {
          min_lon: bounds.getWest(),
          min_lat: bounds.getSouth(),
          max_lon: bounds.getEast(),
          max_lat: bounds.getNorth(),
          grid_size: 0.02,
          aircraft_type: 'HELICOPTER'
        };

        const response = await fetch('/api/air-accessibility/grid-map', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(request)
        });

        if (!response.ok) throw new Error('API hatası: ' + response.status);

        const geoJson = await response.json();

        if (airAccessLayer) map.removeLayer(airAccessLayer);

        airAccessLayer = L.geoJSON(geoJson, {
          pointToLayer: (feature, latlng) => {
            const props = feature.properties;
            const color = getAccessibilityColor(props.accessibility_level);

            return L.circleMarker(latlng, {
              radius: 6,
              fillColor: color,
              color: '#fff',
              weight: 1,
              opacity: 0.9,
              fillOpacity: 0.7
            });
          },
          onEachFeature: (feature, layer) => {
            const props = feature.properties;
            const icon = getAccessibilityIcon(props.accessibility_level);

            const popupContent = `
              <div style="font-family: system-ui, -apple-system, sans-serif; font-size: 12px; min-width: 200px;">
                <div style="font-weight: 700; font-size: 14px; margin-bottom: 8px; color: ${getAccessibilityColor(props.accessibility_level)};">
                  ${icon} ${props.accessibility_level}
                </div>
                <div style="display: grid; gap: 6px;">
                  <div><strong>Skor:</strong> ${props.score}/100</div>
                  <div><strong>Mesafe:</strong> ${props.distance_to_base_km} km</div>
                  <div><strong>Varış:</strong> ~${props.eta_minutes} dakika</div>
                  <div><strong>Araç:</strong> ${props.aircraft_type === 'HELICOPTER' ? '🚁 Helikopter' : props.aircraft_type}</div>
                </div>
              </div>
            `;

            layer.bindPopup(popupContent);
          }
        }).addTo(map);

        if (legendCtl) { try { legendCtl.remove(); } catch(e) {} }
        legendCtl = L.control({position: 'bottomright'});
        legendCtl.onAdd = function() {
          const div = L.DomUtil.create('div', 'legend');
          div.innerHTML = `
            <b>🚁 Hava Erişilebilirliği</b>
            <div class="row"><span class="sw" style="background:#2ecc71"></span>✅ Mükemmel</div>
            <div class="row"><span class="sw" style="background:#3498db"></span>👍 İyi</div>
            <div class="row"><span class="sw" style="background:#f39c12"></span>⚠️ Orta</div>
            <div class="row"><span class="sw" style="background:#e74c3c"></span>⛔ Zor</div>
            <div class="row"><span class="sw" style="background:#8b0000"></span>🚫 Kısıtlı</div>
          `;
          return div;
        };
        legendCtl.addTo(map);

        allActiveLayers.push(airAccessLayer);
        info.textContent = `Hava erişilebilirliği gösteriliyor (${geoJson.features.length} nokta)`;
        setStatus('Hava erişilebilirliği aktif');

      } catch(e) {
        info.textContent = 'Hava erişilebilirliği hatası';
        console.error('Hava erişilebilirliği yükleme hatası:', e);
      }
    }

    async function toggleAirAccessibility() {
      const info = document.getElementById('info');

      if (airAccessLayer) {

    async function loadProximityGrid() {
      const info = document.getElementById('info');
      info.textContent = 'Kaynak yakınlık haritası yükleniyor...';
      setStatus('Kaynak yakınlık haritası yükleniyor...');

      try {
        const response = await fetch('/api/proximity/high-medium-grid?cell_size=0.02');
        if (!response.ok) throw new Error('API hatası: ' + response.status);

        const geoJson = await response.json();

        if (!geoJson.features || geoJson.features.length === 0) {
          info.textContent = 'Kaynak yakınlık verisi bulunamadı';
          return;
        }

        console.log('Proximity grid hücreleri:', geoJson.features.length);

        if (proximityLayer) map.removeLayer(proximityLayer);

        if (!map.getPane('proximityPane')) {
          map.createPane('proximityPane');
          map.getPane('proximityPane').style.zIndex = 700;
        }

        if (!map.getPane('proximityPopupPane')) {
          map.createPane('proximityPopupPane');
          map.getPane('proximityPopupPane').style.zIndex = 1000;
        }

        proximityLayer = L.geoJSON(geoJson, {
          pane: 'proximityPane',
          interactive: true,
          style: (feature) => {
            const props = feature.properties || {};
            const riskClass = props.risk_class || 'MEDIUM_RISK';

            let color, fillOpacity;
            if (riskClass === 'HIGH_RISK') {
              color = '#8b0000';
              fillOpacity = 0.6;
            } else {
              color = '#e74c3c';
              fillOpacity = 0.5;
            }

            return {
              color: color,
              weight: 1.5,
              fillColor: color,
              fillOpacity: fillOpacity,
              opacity: 0.9
            };
          },
          onEachFeature: (feature, layer) => {
            const props = feature.properties || {};
            const riskClass = props.risk_class || 'MEDIUM_RISK';
            const riskScore = (props.combined_risk_score || 0).toFixed(3);
            const pointCount = props.point_count || 0;

            const waterName = props.nearest_water_name || 'Bilinmiyor';
            const waterDist = (props.nearest_water_distance_km !== null && props.nearest_water_distance_km !== undefined)
              ? Number(props.nearest_water_distance_km).toFixed(2) + ' km'

            const fireStationName = props.nearest_fire_station_name || 'Bilinmiyor';
            const fireStationDist = (props.nearest_fire_station_distance_km !== null && props.nearest_fire_station_distance_km !== undefined)
              ? Number(props.nearest_fire_station_distance_km).toFixed(2) + ' km'
              : 'N/A';

            const popupContent = `
              <div style="font-family: system-ui, -apple-system, sans-serif; font-size: 12px; min-width: 220px;">
                <div style="font-weight: 700; font-size: 14px; margin-bottom: 8px; color: ${riskClass === 'HIGH_RISK' ? '#8b0000' : '#e74c3c'};">
                  ${riskClass === 'HIGH_RISK' ? '🔥 Yüksek Risk' : '⚠️ Orta Risk'}
                </div>
                <div style="display: grid; gap: 6px; margin-bottom: 8px;">
                  <div><strong>Risk Skoru:</strong> ${riskScore}</div>
                  <div><strong>Nokta Sayısı:</strong> ${pointCount}</div>
                </div>
                <div style="border-top: 1px solid #ddd; padding-top: 8px; margin-top: 8px;">
                  <div style="font-weight: 600; margin-bottom: 4px; color: #0277BD;">💧 En Yakın Su Kaynağı</div>
                  <div style="margin-left: 12px; margin-bottom: 6px;">
                    <div><strong>${waterName}</strong></div>
                    <div style="font-size: 11px; color: #666;">Mesafe: ${waterDist}</div>
                  </div>
                  <div style="font-weight: 600; margin-bottom: 4px; color: #C41E3A;">🚒 En Yakın İtfaiye</div>
                  <div style="margin-left: 12px;">
                    <div><strong>${fireStationName}</strong></div>
                    <div style="font-size: 11px; color: #666;">Mesafe: ${fireStationDist}</div>
                  </div>
                </div>
                <div style="margin-top: 8px; padding-top: 8px; border-top: 1px solid #ddd; font-size: 10px; color: #888;">
                  💡 Bu bölge için en yakın müdahale kaynakları gösteriliyor
                </div>
              </div>
            `;

            layer.bindPopup(popupContent, {
              className: 'proximity-popup',
              pane: 'proximityPopupPane',
              autoPan: true,
              autoPanPadding: [50, 50]
            });

            layer.on('click', function(e) {
              this.openPopup(e.latlng);
            });

            layer.on('mouseover', function(e) {
              this.setStyle({ weight: 3 });
            });

            layer.on('mouseout', function(e) {
              const props = feature.properties || {};
              const riskClass = props.risk_class || 'MEDIUM_RISK';
              const color = riskClass === 'HIGH_RISK' ? '#8b0000' : '#e74c3c';
              this.setStyle({ weight: 1.5, color: color });
            });
          }
        }).addTo(map);

        if (proximityLegendCtl) {
          try { proximityLegendCtl.remove(); } catch(e) {}
        }

        proximityLegendCtl = L.control({ position: 'bottomright' });
        proximityLegendCtl.onAdd = function() {
          const div = L.DomUtil.create('div', 'legend');
          div.style.backgroundColor = 'white';
          div.style.padding = '10px';
          div.style.borderRadius = '5px';
          div.style.boxShadow = '0 0 15px rgba(0,0,0,0.2)';
          div.style.fontSize = '12px';

          div.innerHTML = '<b>📍 Kaynak Yakınlık Haritası</b><br>' +
            '<div style="margin-top: 6px;">' +
            '<div class="row"><span class="sw" style="background:#8b0000; width: 14px; height: 14px; display: inline-block; margin-right: 6px; border: 1px solid #333;"></span>Yüksek Risk</div>' +
            '<div class="row"><span class="sw" style="background:#e74c3c; width: 14px; height: 14px; display: inline-block; margin-right: 6px; border: 1px solid #333;"></span>Orta Risk</div>' +
            '<div style="margin-top: 8px; font-size: 11px; color: #666; line-height: 1.4;">' +
            '💡 <strong>Nasıl kullanılır:</strong><br>' +
            '• Her kare bir risk bölgesidir<br>' +
            '• Kareye tıklayınca veya üzerine gelince popup açılır<br>' +
            '• Popup\'ta en yakın su kaynağı ve itfaiye bilgileri görünür<br>' +
            '• Mesafeler km cinsinden gösterilir' +
            '</div>' +
            '</div>';
          return div;
        };
        proximityLegendCtl.addTo(map);

        allActiveLayers.push(proximityLayer);
        info.textContent = `Kaynak yakınlık haritası açık (${geoJson.features.length} hücre)`;
        setStatus(`Kaynak yakınlık haritası açık (${geoJson.features.length} hücre)`);

      } catch(e) {
        info.textContent = 'Kaynak yakınlık haritası yükleme hatası: ' + e.message;
        console.error('Proximity yükleme hatası:', e);
      }
    }

    function formatAirAccessLevel(level) {
      if (!level) return 'Bilinmiyor';
      let v = String(level);
      if (v.includes('.')) {
        v = v.split('.').pop();
      }
      const labels = {
        EXCELLENT: 'Mükemmel',
        GOOD: 'İyi',
        MODERATE: 'Orta',
        DIFFICULT: 'Zor',
        RESTRICTED: 'Kısıtlı'
      };
      return labels[v] || v;
    }

    safeBind('btnFireStations', 'click', loadFireStations);
    safeBind('btnProximity', 'click', toggleProximityGrid);
    safeBind('btnIntegrated', 'click', toggleIntegratedLayer);
    safeBind('btnRouteSA', 'click', () => loadOptimizationRoutes('SA'));
    safeBind('btnRouteGA', 'click', () => loadOptimizationRoutes('GA'));
    safeBind('btnRouteClear', 'click', () => {
      clearOptimizationRoutes();
      const info = document.getElementById('info');
      if (info) info.textContent = 'Rota katmani temizlendi';
      setStatus('Rota katmani temizlendi');
    });
    safeBind('routeSelect', 'change', (e) => {
      selectedRouteId = e.target.value || '';
      refreshRouteStyles();
    });
    safeBind('btnFirePoints', 'click', toggleFirePoints);
    safeBind('btnPipeline', 'click', togglePipelineLayer);
    safeBind('btnBoundaryPoints', 'click', ()=>loadBoundaryPoints());
    safeBind('autoRef', 'change', (e)=> setAutoRefresh(e.target.checked));
    safeBind('cellKm', 'change', ()=>{ if (riskActive) loadRiskForView(); });
    safeBind('btnReset', 'click', resetMap);
    safeBind('btnWind', 'click', loadWindAtCenter);
    safeBind('btnSpread', 'click', drawSpread);

    map.on('moveend zoomend', ()=>{ if (riskActive) loadRiskForView(); });
  </script>
</body>
</html>
