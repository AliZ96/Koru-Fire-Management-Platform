<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8"/>
  <title>KORU - Hoş Geldiniz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet"/>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; }
    body {
      background:#000;
      display:flex;
      align-items:center;
      justify-content:center;
      font-family:'Montserrat', system-ui, sans-serif;
      overflow:hidden;
    }
    
    video {
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      object-fit:cover;
      z-index:1;
    }
    
    .welcome-container {
      position:relative;
      z-index:2;
      text-align:center;
      background:rgba(0,0,0,0.5);
      padding:60px 40px;
      border-radius:20px;
      backdrop-filter:blur(10px);
      max-width:800px;
      width:90%;
    }
    
    h1 {
      font-size:64px;
      font-weight:800;
      color:#fff;
      margin-bottom:50px;
      letter-spacing:3px;
      text-shadow:0 4px 20px rgba(0,0,0,0.5);
    }
    
    .buttons {
      display:flex;
      gap:30px;
      flex-wrap:wrap;
      justify-content:center;
      align-items:center;
    }
    
    .btn-welcome {
      background:#fff;
      border:3px solid rgba(139,0,0,0.3);
      border-radius:16px;
      padding:40px 50px;
      cursor:pointer;
      font-family:'Montserrat', sans-serif;
      font-size:20px;
      font-weight:700;
      color:#1a1a2e;
      transition:all 0.3s ease;
      min-width:300px;
      text-align:center;
      box-shadow:0 8px 24px rgba(0,0,0,.15);
      text-decoration:none;
      display:inline-block;
    }
    
    .btn-welcome:hover {
      border-color:rgba(139,0,0,0.8);
      box-shadow:0 12px 36px rgba(139,0,0,.25);
      transform:translateY(-4px);
    }
    
    .btn-welcome:active {
      transform:translateY(-2px);
    }
    
    @media (max-width:768px) {
      h1 {
        font-size:48px;
        margin-bottom:40px;
      }
      
      .buttons {
        gap:20px;
      }
      
      .btn-welcome {
        padding:30px 40px;
        font-size:16px;
        min-width:200px;
      }
      
      .welcome-container {
        padding:40px 20px;
      }
    }
  </style>
</head>
<body>
  <video muted loop autoplay>
    <source src="/static/img/Paragraf%20metniniz.mp4" type="video/mp4">
  </video>
  
  <div class="welcome-container">
    <h1>KORU</h1>
    <div class="buttons">
      <a href="/" class="btn-welcome">🔥 Canlı Yangın ve Risk Haritası</a>
      <a href="/" class="btn-welcome" onclick="alert('İtfaiye istasyonları özelliği yakında açılacak'); return false;">🚒 İtfaiye Nerede?</a>
    </div>
  </div>
  
  <script>
    // Check if logged in
    const isLoggedIn = sessionStorage.getItem('isLoggedIn') === 'true';
    if (!isLoggedIn) {
      window.location.href = '/login';
    }
  </script>
</body>
</html>
