<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1f2e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a3a3a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d5016;stop-opacity:1" />
    </linearGradient>
    
    <radialGradient id="glow" cx="50%" cy="20%" r="60%">
      <stop offset="0%" style="stop-color:#fff;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#fff;stop-opacity:0" />
    </radialGradient>
    
    <filter id="tree-blur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5"/>
    </filter>
  </defs>
  
  <!-- Base gradient background -->
  <rect width="1920" height="1080" fill="url(#bg-gradient)"/>
  
  <!-- Glow effect -->
  <ellipse cx="960" cy="200" rx="800" ry="600" fill="url(#glow)"/>
  
  <!-- Far mountains/hills - very dark -->
  <path d="M0 700 Q240 600 480 650 T960 620 T1440 650 T1920 700 L1920 1080 L0 1080" fill="#0a1a1a" opacity="0.8"/>
  
  <!-- Mid mountains - dark green -->
  <path d="M0 750 Q300 650 600 720 T1200 680 T1800 740 L1920 1080 L0 1080" fill="#1a3a2a" opacity="0.6"/>
  
  <!-- Forest layer 1 - background trees (very faint) -->
  <g opacity="0.2" filter="url(#tree-blur)">
    <ellipse cx="150" cy="700" rx="40" ry="120" fill="#2d5016"/>
    <ellipse cx="350" cy="720" rx="50" ry="140" fill="#2d5016"/>
    <ellipse cx="600" cy="710" rx="45" ry="130" fill="#2d5016"/>
    <ellipse cx="850" cy="730" rx="55" ry="150" fill="#2d5016"/>
    <ellipse cx="1100" cy="710" rx="50" ry="135" fill="#2d5016"/>
    <ellipse cx="1350" cy="720" rx="45" ry="140" fill="#2d5016"/>
    <ellipse cx="1600" cy="700" rx="50" ry="130" fill="#2d5016"/>
    <ellipse cx="1800" cy="715" rx="40" ry="125" fill="#2d5016"/>
  </g>
  
  <!-- Forest layer 2 - mid-distance trees -->
  <g opacity="0.4">
    <!-- Tree 1 -->
    <path d="M100 900 L110 750 L90 800 Z" fill="#0a5a0a"/>
    <ellipse cx="100" cy="740" rx="35" ry="50" fill="#2d7a2d"/>
    <ellipse cx="80" cy="760" rx="25" ry="35" fill="#3a8a3a"/>
    <ellipse cx="120" cy="760" rx="28" ry="38" fill="#3a8a3a"/>
    
    <!-- Tree 2 -->
    <path d="M280 920 L295 720 L265 800 Z" fill="#0a5a0a"/>
    <ellipse cx="280" cy="700" rx="45" ry="65" fill="#2d7a2d"/>
    <ellipse cx="250" cy="730" rx="30" ry="45" fill="#3a8a3a"/>
    <ellipse cx="310" cy="730" rx="32" ry="48" fill="#3a8a3a"/>
    <ellipse cx="280" cy="710" rx="28" ry="40" fill="#3a8a3a"/>
    
    <!-- Tree 3 -->
    <path d="M550 900 L570 680 L530 780 Z" fill="#0a5a0a"/>
    <ellipse cx="550" cy="660" rx="50" ry="70" fill="#2d7a2d"/>
    <ellipse cx="510" cy="700" rx="32" ry="50" fill="#3a8a3a"/>
    <ellipse cx="590" cy="700" rx="35" ry="52" fill="#3a8a3a"/>
    <ellipse cx="550" cy="680" rx="30" ry="45" fill="#3a8a3a"/>
    
    <!-- Tree 4 -->
    <path d="M800 920 L820 700 L780 800 Z" fill="#0a5a0a"/>
    <ellipse cx="800" cy="680" rx="48" ry="68" fill="#2d7a2d"/>
    <ellipse cx="760" cy="720" rx="32" ry="48" fill="#3a8a3a"/>
    <ellipse cx="840" cy="720" rx="34" ry="50" fill="#3a8a3a"/>
    <ellipse cx="800" cy="700" rx="29" ry="42" fill="#3a8a3a"/>
    
    <!-- Tree 5 -->
    <path d="M1100 910 L1120 720 L1080 810 Z" fill="#0a5a0a"/>
    <ellipse cx="1100" cy="700" rx="46" ry="66" fill="#2d7a2d"/>
    <ellipse cx="1060" cy="735" rx="30" ry="46" fill="#3a8a3a"/>
    <ellipse cx="1140" cy="735" rx="33" ry="49" fill="#3a8a3a"/>
    <ellipse cx="1100" cy="715" rx="28" ry="41" fill="#3a8a3a"/>
    
    <!-- Tree 6 -->
    <path d="M1350 900 L1370 740 L1330 820 Z" fill="#0a5a0a"/>
    <ellipse cx="1350" cy="720" rx="44" ry="64" fill="#2d7a2d"/>
    <ellipse cx="1310" cy="755" rx="29" ry="45" fill="#3a8a3a"/>
    <ellipse cx="1390" cy="755" rx="31" ry="47" fill="#3a8a3a"/>
    
    <!-- Tree 7 -->
    <path d="M1650 915 L1670 750 L1630 830 Z" fill="#0a5a0a"/>
    <ellipse cx="1650" cy="730" rx="47" ry="67" fill="#2d7a2d"/>
    <ellipse cx="1610" cy="770" rx="31" ry="47" fill="#3a8a3a"/>
    <ellipse cx="1690" cy="770" rx="34" ry="50" fill="#3a8a3a"/>
    <ellipse cx="1650" cy="745" rx="30" ry="43" fill="#3a8a3a"/>
    
    <!-- Tree 8 -->
    <path d="M1850 900 L1870 760 L1830 830 Z" fill="#0a5a0a"/>
    <ellipse cx="1850" cy="740" rx="40" ry="60" fill="#2d7a2d"/>
    <ellipse cx="1820" cy="775" rx="26" ry="42" fill="#3a8a3a"/>
    <ellipse cx="1880" cy="775" rx="28" ry="44" fill="#3a8a3a"/>
  </g>
  
  <!-- Forest layer 3 - foreground trees (larger, more detailed) -->
  <g opacity="0.6">
    <!-- Large tree left -->
    <path d="M50 1080 L80 650 L20 850 Z" fill="#052a05"/>
    <ellipse cx="50" cy="630" rx="60" ry="90" fill="#1a6a1a"/>
    <ellipse cx="10" cy="690" rx="40" ry="60" fill="#2a7a2a"/>
    <ellipse cx="90" cy="690" rx="42" ry="62" fill="#2a7a2a"/>
    <ellipse cx="50" cy="660" rx="38" ry="58" fill="#2a7a2a"/>
    <ellipse cx="30" cy="650" rx="32" ry="50" fill="#3a8a3a"/>
    <ellipse cx="70" cy="650" rx="30" ry="48" fill="#3a8a3a"/>
    
    <!-- Large tree center-left -->
    <path d="M400 1080 L450 580 L350 800 Z" fill="#052a05"/>
    <ellipse cx="400" cy="560" rx="75" ry="110" fill="#1a6a1a"/>
    <ellipse cx="340" cy="640" rx="48" ry="72" fill="#2a7a2a"/>
    <ellipse cx="460" cy="640" rx="50" ry="74" fill="#2a7a2a"/>
    <ellipse cx="400" cy="590" rx="46" ry="70" fill="#2a7a2a"/>
    <ellipse cx="370" cy="570" rx="40" ry="60" fill="#3a8a3a"/>
    <ellipse cx="430" cy="570" rx="38" ry="58" fill="#3a8a3a"/>
    <ellipse cx="400" cy="540" rx="35" ry="52" fill="#4a9a4a"/>
    
    <!-- Large tree center -->
    <path d="M1000 1080 L1080 500 L920 800 Z" fill="#052a05"/>
    <ellipse cx="1000" cy="480" rx="85" ry="130" fill="#1a6a1a"/>
    <ellipse cx="920" cy="580" rx="52" ry="80" fill="#2a7a2a"/>
    <ellipse cx="1080" cy="580" rx="54" ry="82" fill="#2a7a2a"/>
    <ellipse cx="1000" cy="520" rx="50" ry="76" fill="#2a7a2a"/>
    <ellipse cx="960" cy="500" rx="42" ry="64" fill="#3a8a3a"/>
    <ellipse cx="1040" cy="500" rx="40" ry="62" fill="#3a8a3a"/>
    <ellipse cx="1000" cy="460" rx="38" ry="58" fill="#4a9a4a"/>
    
    <!-- Large tree right -->
    <path d="M1550 1080 L1610 600 L1490 820 Z" fill="#052a05"/>
    <ellipse cx="1550" cy="580" rx="72" ry="108" fill="#1a6a1a"/>
    <ellipse cx="1490" cy="660" rx="46" ry="70" fill="#2a7a2a"/>
    <ellipse cx="1610" cy="660" rx="48" ry="72" fill="#2a7a2a"/>
    <ellipse cx="1550" cy="610" rx="44" ry="68" fill="#2a7a2a"/>
    <ellipse cx="1520" cy="590" rx="38" ry="58" fill="#3a8a3a"/>
    <ellipse cx="1580" cy="590" rx="36" ry="56" fill="#3a8a3a"/>
    
    <!-- Large tree far right -->
    <path d="M1850 1080 L1900 700 L1800 870 Z" fill="#052a05"/>
    <ellipse cx="1850" cy="680" rx="60" ry="85" fill="#1a6a1a"/>
    <ellipse cx="1810" cy="750" rx="40" ry="58" fill="#2a7a2a"/>
    <ellipse cx="1890" cy="750" rx="42" ry="60" fill="#2a7a2a"/>
    <ellipse cx="1850" cy="710" rx="38" ry="55" fill="#2a7a2a"/>
  </g>
  
  <!-- Light rays/atmospheric effect -->
  <g opacity="0.08">
    <rect x="0" y="0" width="1920" height="1080" fill="url(#glow)"/>
  </g>
  
  <!-- Subtle vignette -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
    <stop offset="0%" style="stop-color:#000;stop-opacity:0" />
    <stop offset="100%" style="stop-color:#000;stop-opacity:0.3" />
  </radialGradient>
  <rect width="1920" height="1080" fill="url(#vignette)"/>
</svg>
