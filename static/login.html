<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8"/>
  <title>KORU Yangın Önleme Platformu - Giriş</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root { --brand-red: #8B0000; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; width: 100%; }
    body {
      background: linear-gradient(135deg, #2d5016 0%, #4a7c3a 30%, #6b9d52 50%, #3a6d2c 70%, #1f4620 100%);
      background-attachment: fixed;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Montserrat', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      min-height: 100vh;
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(ellipse at 20% 30%, rgba(139, 101, 60, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 70%, rgba(107, 157, 82, 0.1) 0%, transparent 50%),
        radial-gradient(ellipse at 40% 80%, rgba(63, 121, 59, 0.12) 0%, transparent 50%);
      pointer-events: none;
    }
    .login-container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      width: 100%;
      max-width: 420px;
      padding: 40px;
      animation: slideUp 0.6s ease;
      position: relative;
      z-index: 1;
    }
    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .login-title {
      text-align: center;
      margin-bottom: 12px;
      font-size: 28px;
      font-weight: 800;
      color: var(--brand-red);
      letter-spacing: -0.5px;
    }
    .login-subtitle {
      text-align: center;
      margin-bottom: 32px;
      font-size: 13px;
      color: #666;
      font-weight: 600;
      letter-spacing: 0.3px;
    }
    .user-type-selector {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 28px;
    }
    .user-type-btn {
      padding: 14px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      background: #f9f9f9;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: inherit;
      font-weight: 700;
      font-size: 13px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .user-type-btn:hover {
      border-color: var(--brand-red);
      background: #fff;
    }
    .user-type-btn.active {
      background: var(--brand-red);
      color: #fff;
      border-color: var(--brand-red);
      box-shadow: 0 4px 12px rgba(139, 0, 0, 0.2);
    }
    .form-group {
      margin-bottom: 18px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-size: 12px;
      font-weight: 700;
      color: #333;
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }
    input[type="text"],
    input[type="password"],
    input[type="email"] {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      font-family: inherit;
      font-size: 14px;
      transition: all 0.3s ease;
      background: #fafafa;
    }
    input[type="text"]:focus,
    input[type="password"]:focus,
    input[type="email"]:focus {
      outline: none;
      border-color: var(--brand-red);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(139, 0, 0, 0.1);
    }
    .login-btn {
      width: 100%;
      padding: 14px;
      background: var(--brand-red);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-weight: 700;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 8px;
    }
    .login-btn:hover {
      background: #a00000;
      box-shadow: 0 8px 20px rgba(139, 0, 0, 0.3);
      transform: translateY(-2px);
    }
    .login-btn:active {
      transform: translateY(0);
    }
    .demo-note {
      text-align: center;
      font-size: 12px;
      color: #999;
      margin-top: 20px;
      font-weight: 600;
    }
    .error-message {
      display: none;
      background: #ffebee;
      color: #c62828;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 13px;
      font-weight: 600;
      border-left: 4px solid #c62828;
    }
    .error-message.show {
      display: block;
      animation: shake 0.4s ease;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h1 class="login-title">KORU</h1>
    <p class="login-subtitle">Yangın Önleme Platformu</p>
    
    <div class="error-message" id="errorMsg"></div>
    
    <div class="user-type-selector">
      <button class="user-type-btn active" data-type="user" id="btnUser">👤 Kullanıcı</button>
      <button class="user-type-btn" data-type="admin" id="btnAdmin">🔐 Admin</button>
    </div>
    
    <form id="loginForm">
      <div class="form-group">
        <label for="username">Kullanıcı Adı</label>
        <input type="text" id="username" name="username" placeholder="Kullanıcı adınızı girin" required/>
      </div>
      
      <div class="form-group">
        <label for="password">Şifre</label>
        <input type="password" id="password" name="password" placeholder="Şifrenizi girin" required/>
      </div>
      
      <button type="submit" class="login-btn">Giriş Yap</button>
    </form>
    
    <p class="demo-note">Demo: Herhangi bir kullanıcı adı ve şifre ile giriş yapabilirsiniz</p>
    
    <div style="background: #f5f5f5; border-left: 4px solid var(--brand-red); padding: 12px; border-radius: 4px; margin-top: 20px; font-size: 12px;">
      <p style="margin-bottom: 8px; font-weight: 700; color: #333;">Örnek Giriş Bilgileri:</p>
      <p style="margin: 4px 0; color: #666;"><strong>Kullanıcı hesabı:</strong> user1 / password123</p>
      <p style="margin: 4px 0; color: #666;"><strong>Admin hesabı:</strong> admin / admin123</p>
    </div>
  </div>

  <script>
    let currentUserType = 'user';
    
    // User type selector
    document.getElementById('btnUser').addEventListener('click', function() {
      currentUserType = 'user';
      document.getElementById('btnUser').classList.add('active');
      document.getElementById('btnAdmin').classList.remove('active');
    });
    
    document.getElementById('btnAdmin').addEventListener('click', function() {
      currentUserType = 'admin';
      document.getElementById('btnAdmin').classList.add('active');
      document.getElementById('btnUser').classList.remove('active');
    });
    
    // Form submission
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      const errorMsg = document.getElementById('errorMsg');
      
      // Clear previous error
      errorMsg.classList.remove('show');
      
      // Validation
      if (!username || !password) {
        showError('Lütfen tüm alanları doldurunuz');
        return;
      }
      
      // Store user info in sessionStorage
      sessionStorage.setItem('userType', currentUserType);
      sessionStorage.setItem('username', username);
      sessionStorage.setItem('isLoggedIn', 'true');
      
      // Redirect to main page
      window.location.href = '/';
    });
    
    function showError(message) {
      const errorMsg = document.getElementById('errorMsg');
      errorMsg.textContent = message;
      errorMsg.classList.add('show');
    }
    
    // Check if already logged in
    if (sessionStorage.getItem('isLoggedIn') === 'true') {
      window.location.href = '/';
    }
  </script>
</body>
</html>
