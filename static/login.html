<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8"/>
  <title>KORU Yangın Önleme Platformu - Giriş</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root { --brand-red: #8B0000; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; width: 100%; }
    body {
      background-image: url('/static/img/Paragraf metniniz.svg');
      background-attachment: fixed;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Montserrat', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      min-height: 100vh;
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(ellipse at 20% 20%, rgba(255, 255, 255, 0.03) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(0, 0, 0, 0.25) 0%, transparent 50%);
      pointer-events: none;
    }
    .login-container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      width: 100%;
      max-width: 420px;
      padding: 40px;
      animation: slideUp 0.6s ease;
      position: relative;
      z-index: 1;
    }
    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .login-title {
      text-align: center;
      margin-bottom: 12px;
      font-size: 28px;
      font-weight: 800;
      color: var(--brand-red);
      letter-spacing: -0.5px;
    }
    .login-subtitle {
      text-align: center;
      margin-bottom: 32px;
      font-size: 13px;
      color: #666;
      font-weight: 600;
      letter-spacing: 0.3px;
    }
    .user-type-selector {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 28px;
    }
    .user-type-btn {
      padding: 14px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      background: #f9f9f9;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: inherit;
      font-weight: 700;
      font-size: 13px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .user-type-btn:hover {
      border-color: var(--brand-red);
      background: #fff;
    }
    .user-type-btn.active {
      background: var(--brand-red);
      color: #fff;
      border-color: var(--brand-red);
      box-shadow: 0 4px 12px rgba(139, 0, 0, 0.2);
    }
    .form-group {
      margin-bottom: 18px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-size: 12px;
      font-weight: 700;
      color: #333;
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }
    input[type="text"],
    input[type="password"],
    input[type="email"] {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      font-family: inherit;
      font-size: 14px;
      transition: all 0.3s ease;
      background: #fafafa;
    }
    input[type="text"]:focus,
    input[type="password"]:focus,
    input[type="email"]:focus {
      outline: none;
      border-color: var(--brand-red);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(139, 0, 0, 0.1);
    }
    .login-btn {
      width: 100%;
      padding: 14px;
      background: var(--brand-red);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-weight: 700;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 8px;
    }
    .login-btn:hover {
      background: #a00000;
      box-shadow: 0 8px 20px rgba(139, 0, 0, 0.3);
      transform: translateY(-2px);
    }
    .login-btn:active {
      transform: translateY(0);
    }
    .demo-note {
      text-align: center;
      font-size: 12px;
      color: #999;
      margin-top: 20px;
      font-weight: 600;
    }
    .error-message {
      display: none;
      background: #ffebee;
      color: #c62828;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 13px;
      font-weight: 600;
      border-left: 4px solid #c62828;
    }
    .error-message.show {
      display: block;
      animation: shake 0.4s ease;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }
    .auth-toggle {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      background: #f5f5f5;
      padding: 4px;
      border-radius: 10px;
    }
    .auth-toggle-btn {
      flex: 1;
      padding: 12px 16px;
      border: none;
      background: transparent;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.3px;
      color: #666;
      transition: all 0.3s ease;
      text-transform: uppercase;
      font-family: inherit;
    }
    .auth-toggle-btn:hover {
      color: var(--brand-red);
    }
    .auth-toggle-btn.active {
      background: #fff;
      color: var(--brand-red);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }
    .auth-form {
      display: none;
    }
    .auth-form.active {
      display: block;
      animation: slideUp 0.4s ease;
    }
    .signup-extra-fields {
      display: none;
    }
    .signup-extra-fields.active {
      display: block;
    }
    .signup-extra-fields .form-group {
      margin-bottom: 12px;
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .form-row .form-group {
      margin-bottom: 0;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h1 class="login-title">KORU</h1>
    <p class="login-subtitle">Yangın Önleme Platformu</p>
    
    <div class="error-message" id="errorMsg"></div>
    
    <!-- Login/Signup Toggle -->
    <div class="auth-toggle">
      <button type="button" class="auth-toggle-btn active" id="btnLoginTab" data-tab="login">🔓 Giriş Yap</button>
      <button type="button" class="auth-toggle-btn" id="btnSignupTab" data-tab="signup">📝 Kayıt Ol</button>
    </div>
    
    <!-- User Type Selector (only for login) -->
    <div class="user-type-selector" id="userTypeSelector">
      <button type="button" class="user-type-btn active" data-type="user" id="btnUser">👤 Kullanıcı</button>
      <button type="button" class="user-type-btn" data-type="admin" id="btnAdmin">🔐 Admin</button>
    </div>
    
    <!-- Login Form -->
    <form id="loginForm" class="auth-form active">
      <div class="form-group">
        <label for="username">Kullanıcı Adı</label>
        <input type="text" id="username" name="username" placeholder="Kullanıcı adınızı girin" required/>
      </div>
      
      <div class="form-group">
        <label for="password">Şifre</label>
        <input type="password" id="password" name="password" placeholder="Şifrenizi girin" required/>
      </div>
      
      <button type="submit" class="login-btn">Giriş Yap</button>
    </form>
    
    <p class="demo-note">Demo: Herhangi bir kullanıcı adı ve şifre ile giriş yapabilirsiniz</p>
    
    <div style="background: #f5f5f5; border-left: 4px solid var(--brand-red); padding: 12px; border-radius: 4px; margin-top: 16px; font-size: 12px;">
      <p style="margin-bottom: 6px; font-weight: 700; color: #333;">📋 Örnek Giriş Bilgileri:</p>
      <p style="margin: 2px 0; color: #666;"><strong>Kullanıcı:</strong> user1 / password123</p>
      <p style="margin: 2px 0; color: #666;"><strong>Admin:</strong> admin / admin123</p>
    </div>
    
    <!-- Signup Form -->
    <form id="signupForm" class="auth-form">
      <div class="form-group">
        <label for="signup-fullname">Ad Soyad</label>
        <input type="text" id="signup-fullname" name="fullname" placeholder="Ad ve soyadınızı girin" required/>
      </div>
      
      <div class="form-group">
        <label for="signup-email">E-posta</label>
        <input type="email" id="signup-email" name="email" placeholder="E-posta adresinizi girin" required/>
      </div>
      
      <div class="form-group">
        <label for="signup-username">Kullanıcı Adı</label>
        <input type="text" id="signup-username" name="username" placeholder="Bir kullanıcı adı seçin" required/>
      </div>
      
      <div class="form-row">
        <div class="form-group">
          <label for="signup-password">Şifre</label>
          <input type="password" id="signup-password" name="password" placeholder="Şifre" required/>
        </div>
        <div class="form-group">
          <label for="signup-confirm-password">Şifre Tekrarı</label>
          <input type="password" id="signup-confirm-password" name="confirm-password" placeholder="Şifre tekrarı" required/>
        </div>
      </div>
      
      <div class="form-group" style="margin-bottom: 16px;">
        <label style="display: flex; align-items: center; text-transform: none; font-weight: 500; gap: 8px;">
          <input type="checkbox" id="signup-terms" name="terms" style="width: 18px; height: 18px; cursor: pointer;"/>
          <span>Şartları ve koşulları kabul ediyorum</span>
        </label>
      </div>
      
      <button type="submit" class="login-btn">Kayıt Ol</button>
    </form>
  </div>

  <script>
    let currentUserType = 'user';
    let currentTab = 'login';
    
    // Tab switching
    document.getElementById('btnLoginTab').addEventListener('click', function() {
      switchTab('login');
    });
    
    document.getElementById('btnSignupTab').addEventListener('click', function() {
      switchTab('signup');
    });
    
    function switchTab(tab) {
      currentTab = tab;
      const errorMsg = document.getElementById('errorMsg');
      errorMsg.classList.remove('show');
      
      if (tab === 'login') {
        document.getElementById('loginForm').classList.add('active');
        document.getElementById('signupForm').classList.remove('active');
        document.getElementById('userTypeSelector').style.display = 'grid';
        document.getElementById('btnLoginTab').classList.add('active');
        document.getElementById('btnSignupTab').classList.remove('active');
      } else {
        document.getElementById('signupForm').classList.add('active');
        document.getElementById('loginForm').classList.remove('active');
        document.getElementById('userTypeSelector').style.display = 'none';
        document.getElementById('btnSignupTab').classList.add('active');
        document.getElementById('btnLoginTab').classList.remove('active');
      }
    }
    
    // User type selector
    document.getElementById('btnUser').addEventListener('click', function() {
      currentUserType = 'user';
      document.getElementById('btnUser').classList.add('active');
      document.getElementById('btnAdmin').classList.remove('active');
    });
    
    document.getElementById('btnAdmin').addEventListener('click', function() {
      currentUserType = 'admin';
      document.getElementById('btnAdmin').classList.add('active');
      document.getElementById('btnUser').classList.remove('active');
    });
    
    // Login form submission
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      const errorMsg = document.getElementById('errorMsg');
      
      // Clear previous error
      errorMsg.classList.remove('show');
      
      // Validation
      if (!username || !password) {
        showError('Lütfen tüm alanları doldurunuz');
        return;
      }
      
      // Store user info in sessionStorage
      sessionStorage.setItem('userType', currentUserType);
      sessionStorage.setItem('username', username);
      sessionStorage.setItem('isLoggedIn', 'true');
      
      // Redirect to main page
      window.location.href = '/';
    });
    
    // Signup form submission
    document.getElementById('signupForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const fullname = document.getElementById('signup-fullname').value.trim();
      const email = document.getElementById('signup-email').value.trim();
      const username = document.getElementById('signup-username').value.trim();
      const password = document.getElementById('signup-password').value.trim();
      const confirmPassword = document.getElementById('signup-confirm-password').value.trim();
      const terms = document.getElementById('signup-terms').checked;
      const errorMsg = document.getElementById('errorMsg');
      
      // Clear previous error
      errorMsg.classList.remove('show');
      
      // Validation
      if (!fullname || !email || !username || !password || !confirmPassword) {
        showError('Lütfen tüm alanları doldurunuz');
        return;
      }
      
      if (password !== confirmPassword) {
        showError('Şifreler eşleşmiyor');
        return;
      }
      
      if (password.length < 6) {
        showError('Şifre en az 6 karakter olmalıdır');
        return;
      }
      
      if (!terms) {
        showError('Lütfen şartları ve koşulları kabul ediniz');
        return;
      }
      
      // Store user info in sessionStorage
      sessionStorage.setItem('userType', 'user');
      sessionStorage.setItem('username', username);
      sessionStorage.setItem('fullname', fullname);
      sessionStorage.setItem('email', email);
      sessionStorage.setItem('isLoggedIn', 'true');
      
      // Redirect to main page
      window.location.href = '/';
    });
    
    function showError(message) {
      const errorMsg = document.getElementById('errorMsg');
      errorMsg.textContent = message;
      errorMsg.classList.add('show');
    }
    
    // Check if already logged in
    if (sessionStorage.getItem('isLoggedIn') === 'true') {
      window.location.href = '/';
    }
  </script>
</body>
</html>
