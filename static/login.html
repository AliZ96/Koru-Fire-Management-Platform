<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8"/>
  <title>KORU — Giriş</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:        #061209;
      --surface:   #0C1E0E;
      --card:      rgba(16, 32, 14, 0.85);
      --border:    rgba(74, 124, 58, 0.22);
      --border-hi: rgba(245, 158, 11, 0.55);
      --accent:    #F59E0B;
      --accent-dim:#92610A;
      --green:     #4A7C3A;
      --green-lo:  #1A3A1A;
      --text:      #D8EDD0;
      --text-2:    #6B9D5C;
      --text-muted:#3E5C38;
      --fire:      #FF6B35;
      --danger:    #EF4444;
      --glow:      rgba(74, 124, 58, 0.18);
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body { height:100%; }
    body {
      background-color: var(--bg);
      font-family: 'Inter', system-ui, sans-serif;
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:100vh;
      overflow:hidden;
      position:relative;
    }

    /* Ambient background layers */
    .bg-orb {
      position:fixed;
      border-radius:50%;
      filter:blur(80px);
      pointer-events:none;
      z-index:0;
    }
    .bg-orb-1 {
      width:600px; height:600px;
      background:radial-gradient(circle, rgba(30,80,20,0.35) 0%, transparent 70%);
      top:-150px; left:-100px;
    }
    .bg-orb-2 {
      width:400px; height:400px;
      background:radial-gradient(circle, rgba(245,158,11,0.08) 0%, transparent 70%);
      bottom:-80px; right:-60px;
    }
    .bg-orb-3 {
      width:300px; height:300px;
      background:radial-gradient(circle, rgba(20,60,15,0.4) 0%, transparent 70%);
      top:40%; left:50%;
      transform:translate(-50%,-50%);
    }

    /* Grid lines */
    .bg-grid {
      position:fixed;
      inset:0;
      background-image:
        linear-gradient(rgba(74,124,58,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(74,124,58,0.04) 1px, transparent 1px);
      background-size:48px 48px;
      z-index:0;
    }

    /* Card */
    .card {
      position:relative;
      z-index:1;
      width:100%;
      max-width:400px;
      margin:0 20px;
      background: var(--card);
      border:1px solid var(--border);
      border-radius:20px;
      padding:44px 40px 40px;
      backdrop-filter:blur(24px);
      -webkit-backdrop-filter:blur(24px);
      box-shadow:
        0 0 0 1px rgba(74,124,58,0.08) inset,
        0 24px 64px rgba(0,0,0,0.55),
        0 0 80px rgba(30,80,20,0.12);
    }

    /* Glow line at top of card */
    .card::before {
      content:'';
      position:absolute;
      top:0; left:40px; right:40px; height:1px;
      background:linear-gradient(90deg, transparent, rgba(74,124,58,0.5), rgba(245,158,11,0.3), transparent);
      border-radius:1px;
    }

    /* Brand */
    .brand {
      text-align:center;
      margin-bottom:36px;
    }
    .brand-logo {
      display:inline-flex;
      align-items:center;
      gap:10px;
      margin-bottom:8px;
    }
    .brand-icon {
      width:36px; height:36px;
      background:linear-gradient(135deg, var(--accent) 0%, #E67E00 100%);
      border-radius:10px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:18px;
      box-shadow:0 4px 16px rgba(245,158,11,0.35);
    }
    .brand-name {
      font-size:26px;
      font-weight:700;
      letter-spacing:4px;
      color:var(--text);
    }
    .brand-sub {
      font-size:11px;
      font-weight:500;
      color:var(--text-2);
      letter-spacing:2px;
      text-transform:uppercase;
    }

    /* Divider */
    .divider {
      height:1px;
      background:var(--border);
      margin-bottom:28px;
    }

    /* Form */
    .field {
      margin-bottom:16px;
    }
    .field label {
      display:block;
      font-size:11px;
      font-weight:600;
      letter-spacing:1.2px;
      text-transform:uppercase;
      color:var(--text-2);
      margin-bottom:8px;
    }
    .field-wrap {
      position:relative;
    }
    .field-icon {
      position:absolute;
      left:14px;
      top:50%;
      transform:translateY(-50%);
      font-size:15px;
      opacity:0.5;
      pointer-events:none;
    }
    .field input {
      width:100%;
      height:46px;
      background:rgba(6,18,9,0.7);
      border:1px solid var(--border);
      border-radius:12px;
      padding:0 14px 0 42px;
      color:var(--text);
      font-family:'Inter', sans-serif;
      font-size:14px;
      font-weight:400;
      outline:none;
      transition:border-color .2s, box-shadow .2s;
    }
    .field input::placeholder { color:var(--text-muted); }
    .field input:focus {
      border-color:var(--border-hi);
      box-shadow:0 0 0 3px rgba(245,158,11,0.08), 0 0 16px rgba(74,124,58,0.15);
    }

    /* Options row */
    .options-row {
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:24px;
    }
    .remember {
      display:flex;
      align-items:center;
      gap:8px;
      cursor:pointer;
      font-size:12px;
      color:var(--text-2);
      user-select:none;
    }
    .remember input[type=checkbox] {
      width:14px; height:14px;
      accent-color:var(--accent);
      cursor:pointer;
    }
    .forgot {
      font-size:12px;
      color:var(--text-muted);
      text-decoration:none;
      transition:color .2s;
    }
    .forgot:hover { color:var(--accent); }

    /* Submit button */
    .btn-submit {
      width:100%;
      height:48px;
      background:linear-gradient(135deg, #D97706 0%, var(--accent) 50%, #D97706 100%);
      background-size:200% 100%;
      border:none;
      border-radius:12px;
      color:#0A0A0A;
      font-family:'Inter', sans-serif;
      font-size:14px;
      font-weight:700;
      letter-spacing:1px;
      text-transform:uppercase;
      cursor:pointer;
      transition:background-position .4s ease, box-shadow .2s, transform .1s;
      box-shadow:0 4px 20px rgba(245,158,11,0.3);
      position:relative;
      overflow:hidden;
    }
    .btn-submit:hover {
      background-position:100% 0;
      box-shadow:0 6px 28px rgba(245,158,11,0.45);
      transform:translateY(-1px);
    }
    .btn-submit:active {
      transform:translateY(0);
      box-shadow:0 2px 12px rgba(245,158,11,0.25);
    }

    /* Status bar */
    .status-bar {
      display:flex;
      align-items:center;
      justify-content:center;
      gap:6px;
      margin-top:24px;
    }
    .status-dot {
      width:6px; height:6px;
      border-radius:50%;
      background:var(--green);
      animation:pulse 2s ease-in-out infinite;
    }
    .status-text {
      font-size:11px;
      color:var(--text-muted);
      letter-spacing:.5px;
    }

    @keyframes pulse {
      0%, 100% { opacity:1; transform:scale(1); }
      50% { opacity:0.5; transform:scale(0.85); }
    }

    /* Floating status indicators */
    .corner-badge {
      position:fixed;
      bottom:24px;
      right:24px;
      z-index:5;
      display:flex;
      align-items:center;
      gap:6px;
      background:rgba(12,30,14,0.8);
      border:1px solid var(--border);
      border-radius:20px;
      padding:6px 12px;
      font-size:11px;
      color:var(--text-2);
      backdrop-filter:blur(8px);
    }
    .live-dot {
      width:7px; height:7px;
      border-radius:50%;
      background:#EF4444;
      animation:livepulse 1.2s ease-in-out infinite;
    }
    @keyframes livepulse {
      0%, 100% { opacity:1; box-shadow:0 0 0 0 rgba(239,68,68,0.4); }
      50% { opacity:0.8; box-shadow:0 0 0 4px rgba(239,68,68,0); }
    }

    /* Mobile */
    @media (max-width:480px) {
      .card { padding:32px 24px 28px; }
      .brand-name { font-size:22px; }
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="bg-orb bg-orb-3"></div>

  <div class="card">
    <div class="brand">
      <div class="brand-logo">
        <div class="brand-icon">🌲</div>
        <span class="brand-name">KORU</span>
      </div>
      <div class="brand-sub">Yangın Önleme Platformu</div>
    </div>
    <div class="divider"></div>

    <form onsubmit="handleLogin(event)">
      <div class="field">
        <label for="username">Kullanıcı Adı</label>
        <div class="field-wrap">
          <span class="field-icon">👤</span>
          <input type="text" id="username" placeholder="kullanici@izmir.bel.tr" autocomplete="username"/>
        </div>
      </div>
      <div class="field">
        <label for="password">Şifre</label>
        <div class="field-wrap">
          <span class="field-icon">🔒</span>
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
        </div>
      </div>

      <div class="options-row">
        <label class="remember">
          <input type="checkbox"/> Beni hatırla
        </label>
        <a href="#" class="forgot">Şifremi unuttum</a>
      </div>

      <button type="submit" class="btn-submit">Giriş Yap</button>
    </form>

    <div class="status-bar">
      <div class="status-dot"></div>
      <span class="status-text">Sistem Aktif — İzmir Afet Yönetimi</span>
    </div>
  </div>

  <div class="corner-badge">
    <div class="live-dot"></div>
    <span>Canlı İzleme</span>
  </div>

  <script>
    function handleLogin(e) {
      e.preventDefault();
      const btn = e.target.querySelector('.btn-submit');
      btn.textContent = '⏳ Doğrulanıyor...';
      btn.disabled = true;
      setTimeout(() => {
        btn.textContent = '✓ Giriş Yapıldı';
        btn.style.background = 'linear-gradient(135deg, #16a34a, #22c55e)';
        setTimeout(() => {
          window.location.href = '/welcome';
        }, 700);
      }, 1000);
    }
  </script>
</body>
</html>
